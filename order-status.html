<style>
/* === 覆蓋舊 Tailwind class，套用新設計 === */


/* 主容器 */
.px-4.py-6.max-w-xl.mx-auto { padding: 0 !important; }
.px-4.py-6 { padding: 0 !important; }
.max-w-xl.mx-auto { max-width: 640px; margin: 0 auto; }

/* Tab */
.flex.gap-2.mb-5.border-b {
  display: flex !important; border-bottom: 2px solid var(--gray-200) !important;
  background: var(--white); padding: 0 16px !important; margin: 0 !important; gap: 0 !important;
}
#tab1, #tab2 {
  padding: 14px 16px !important; font-size: 15px !important; font-weight: 600 !important;
  border: none !important; background: none !important; cursor: pointer;
}

/* 輸入框和按鈕 */
.flex.gap-2.mb-4 { display: flex; gap: 8px; padding: 16px; background: var(--white); margin-bottom: 0 !important; }
.flex-1.border.rounded-xl.px-4.py-3 { border: 1px solid var(--gray-200) !important; border-radius: var(--radius) !important; padding: 13px 14px !important; font-size: 16px !important; }
.space-y-3.mb-4 { display: flex; flex-direction: column; gap: 10px; padding: 16px; background: var(--white); margin-bottom: 0 !important; }
.w-full.border.rounded-xl.px-4.py-3 { border: 1px solid var(--gray-200) !important; border-radius: var(--radius) !important; padding: 13px 14px !important; font-size: 16px !important; }
.px-5.py-3.bg-black.text-white.rounded-xl { background: var(--black) !important; color: var(--white) !important; border-radius: var(--radius) !important; padding: 13px 20px !important; border: none !important; cursor: pointer; font-size: 15px !important; font-weight: 600 !important; white-space: nowrap; }
.w-full.py-3.bg-black.text-white.rounded-xl { background: var(--black) !important; color: var(--white) !important; border-radius: var(--radius) !important; padding: 14px !important; border: none !important; cursor: pointer; font-size: 15px !important; font-weight: 600 !important; width: 100% !important; display: block !important; }

/* 訂單卡片 */
.bg-white.rounded-xl.border.px-4.py-3 {
  background: var(--white) !important; border-radius: var(--radius-lg) !important;
  border: none !important; padding: 12px 16px !important;
  box-shadow: none !important;
}
.space-y-3 { display: flex; flex-direction: column; gap: 8px; }
.font-bold.text-sm { font-size: 15px !important; font-weight: 700 !important; }
.text-xs.text-gray-400 { font-size: 13px !important; color: var(--gray-400) !important; }
.text-sm.font-medium.text-gray-800 { font-size: 15px !important; }
.font-bold.text-red-500.text-sm { font-size: 15px !important; font-weight: 700 !important; color: var(--black) !important; }

/* 狀態 badge */
.text-xs.px-2.py-0\.5.rounded-full { font-size: 12px !important; padding: 3px 10px !important; border-radius: var(--radius-sm) !important; }

/* 集運批次 */
.bg-white.rounded-xl.border-2.border-blue-200.overflow-hidden { border-radius: var(--radius-lg) !important; border: 2px solid #bfdbfe !important; }
.bg-blue-50.px-4.py-2 { background: #eff6ff !important; padding: 10px 16px !important; }
.text-xs.font-bold.text-blue-600 { font-size: 13px !important; font-weight: 700 !important; color: #1d4ed8 !important; }
.text-xs.text-blue-400 { font-size: 12px !important; color: #60a5fa !important; }
.text-xs.px-2.py-1.bg-white.border.border-blue-200.text-blue-500.rounded-lg { font-size: 12px !important; padding: 5px 10px !important; border: 1px solid #bfdbfe !important; border-radius: var(--radius-sm) !important; color: #2563eb !important; background: var(--white) !important; cursor: pointer; }

/* Modal */
.fixed.inset-0.z-50.bg-black.bg-opacity-40 { background: rgba(0,0,0,0.5) !important; }
.bg-white.w-full.sm\:max-w-md.sm\:rounded-2xl.rounded-t-2xl { border-radius: var(--radius-lg) var(--radius-lg) 0 0 !important; max-width: 480px !important; }
.font-bold.text-base { font-size: 17px !important; font-weight: 700 !important; }
.px-5.py-4.border-b { padding: 16px 20px !important; }
.px-5.py-4.border-t { padding: 16px 20px !important; }
.flex-1.overflow-y-auto.px-5.py-4 { padding: 16px 20px !important; }

/* 修改商品 Modal 商品行 */
.flex.items-center.gap-3.border.rounded-xl.p-3 { padding: 12px !important; border-radius: var(--radius) !important; border: 1px solid var(--gray-200) !important; }

/* 大按鈕 */
.w-full.py-3.border.rounded-xl.text-sm { border: 1px solid var(--gray-200) !important; border-radius: var(--radius) !important; padding: 14px !important; font-size: 15px !important; background: var(--white) !important; cursor: pointer; font-weight: 500 !important; }
.flex-1.py-2\.5.bg-black.text-white { background: var(--black) !important; color: var(--white) !important; padding: 12px !important; border: none !important; border-radius: var(--radius) !important; cursor: pointer; font-size: 15px !important; font-weight: 600 !important; }
.flex-1.py-2\.5.border.rounded-xl { border: 1px solid var(--gray-200) !important; border-radius: var(--radius) !important; padding: 12px !important; font-size: 15px !important; background: var(--white) !important; cursor: pointer; }

/* 集運合併區 */
#mergeArea { background: var(--white) !important; border-radius: var(--radius-lg) !important; border: none !important; padding: 16px !important; }
.text-xs.font-semibold.text-gray-500 { font-size: 13px !important; font-weight: 600 !important; color: var(--gray-600) !important; }

/* panel */
#panel1, #panel2 { background: transparent; }

/* renderOrderDetail 覆蓋 */
.text-sm.text-gray-600.mb-3 { font-size:14px; color:var(--gray-600); margin-bottom:12px; }
.flex.items-center.gap-1.text-sm.text-gray-400 { display:flex; align-items:center; gap:6px; font-size:14px; color:var(--gray-400); margin-bottom:16px; background:none; border:none; cursor:pointer; }
.flex.flex-col.items-center.flex-1 { display:flex; flex-direction:column; align-items:center; flex:1; }
.flex.justify-between.items-start.text-sm { display:flex; justify-content:space-between; align-items:flex-start; font-size:15px; }
.text-gray-700.flex-1.mr-2 { color:var(--black); flex:1; margin-right:8px; }
.flex.justify-between.py-2.text-sm.border-b { display:flex; justify-content:space-between; padding:8px 0; font-size:14px; border-bottom:1px solid var(--gray-200); }
.bg-white.rounded-xl.border.px-4.py-4.mb-3 { background:var(--white); border-radius:var(--radius-lg); border:none; padding:16px; margin-bottom:10px; }
.bg-white.rounded-xl.border.px-4.py-5.mb-3 { background:var(--white); border-radius:var(--radius-lg); border:none; padding:16px; margin-bottom:10px; }
.flex.justify-between.items-start.mb-3 { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.font-bold.tracking-wider { font-weight:700; letter-spacing:0.05em; font-size:20px; }
.flex.items-start { display:flex; align-items:flex-start; }
.flex.justify-between.items-center.py-2.text-sm.text-green-600 { display:flex; justify-content:space-between; align-items:center; padding:6px 0; font-size:14px; color:var(--green); }
.flex.justify-between.items-center.py-2.text-sm { display:flex; justify-content:space-between; align-items:center; padding:6px 0; font-size:14px; }
.flex.justify-between.items-center.mt-3.pt-3.border-t.font-bold { display:flex; justify-content:space-between; align-items:center; margin-top:12px; padding-top:12px; border-top:1px solid var(--gray-200); font-weight:700; }
.text-lg { font-size:22px !important; }
.text-red-500 { color:var(--black) !important; }
.text-green-600 { color:var(--green) !important; }
.text-gray-400 { color:var(--gray-400) !important; }
.text-blue-500 { color:#2563eb !important; }
.text-gray-600 { color:var(--gray-600) !important; }
.font-medium { font-weight:500 !important; }
.font-semibold { font-weight:600 !important; }
.font-bold { font-weight:700 !important; }
.text-xl { font-size:20px !important; }
.text-xs { font-size:12px !important; }
.text-sm { font-size:14px !important; }
.text-base { font-size:16px !important; }
.text-lg { font-size:20px !important; }
.line-clamp-2 { overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.shrink-0 { flex-shrink:0 !important; }
.w-full { width:100% !important; }
.min-w-0 { min-width:0 !important; }
.mt-2 { margin-top:8px !important; }
.mt-3 { margin-top:12px !important; }
.mb-1 { margin-bottom:4px !important; }
.mb-2 { margin-bottom:8px !important; }
.mb-3 { margin-bottom:12px !important; }
.mb-4 { margin-bottom:16px !important; }
.pt-2 { padding-top:8px !important; }
.pt-3 { padding-top:12px !important; }
.pb-2 { padding-bottom:8px !important; }
.border-t { border-top:1px solid var(--gray-200) !important; }
.border-b { border-bottom:1px solid var(--gray-200) !important; }
.rounded-full { border-radius:50% !important; }
.overflow-hidden { overflow:hidden !important; }
.cursor-pointer { cursor:pointer !important; }
.items-center { align-items:center !important; }
.justify-between { justify-content:space-between !important; }
.gap-1 { gap:4px !important; }
.gap-2 { gap:8px !important; }
.gap-3 { gap:12px !important; }
.flex-1 { flex:1 !important; }
</style>

<div class="page-wrap" style="max-width:640px;margin:0 auto;padding:20px 16px">

  <!-- 說明文字 -->
  <div style="margin-bottom:24px">
    <div style="font-size:22px;font-weight:700;margin-bottom:6px">查詢我的訂單</div>
    <div style="font-size:14px;color:var(--gray-400)">輸入訂單編號 或 客戶編號 + Email</div>
  </div>

  <!-- 訂單編號查詢 -->
  <div style="background:var(--white);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px">
    <div style="font-size:15px;font-weight:700;margin-bottom:4px">用訂單編號查詢</div>
    <div style="font-size:13px;color:var(--gray-400);margin-bottom:14px">結帳後收到的 ORD 開頭編號</div>
    <div style="display:flex;gap:8px">
      <input id="orderInput" type="text" placeholder="例如：ORD12345678"

      <button onclick="queryByOrder()" class="btn-primary" style="width:auto;padding:13px 20px;white-space:nowrap">

  </div>

  <!-- 客戶編號查詢 -->
  <div style="background:var(--white);border-radius:var(--radius-lg);padding:20px">
    <div style="font-size:15px;font-weight:700;margin-bottom:4px">用客戶編號查詢所有訂單</div>
    <div style="font-size:13px;color:var(--gray-400);margin-bottom:14px">結帳後拿到的 W-82 或 C-161 開頭編號</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <input id="customerInput" type="text" placeholder="例如：W-82I"
        style="text-transform:uppercase"

<script type="module">
import { formatPrice } from "./js/utils.js";

const QUERY_API    = "https://shoptest-chi.vercel.app/api/orders-manage?type=query";
const CUSTOMER_API_URL = "https://shoptest-chi.vercel.app/api/orders-manage?type=customer";

const STATUS_MAP = {
  "待處理":   { icon: "🕐", color: "background:#fef9c3;color:#a16207", bar: 1 },
  "處理中":   { icon: "📦", color: "background:#dbeafe;color:#1d4ed8", bar: 2 },
  "已出貨":   { icon: "🚚", color: "background:#ede9fe;color:#6d28d9", bar: 3 },
  "已完成":   { icon: "✅", color: "background:#dcfce7;color:#15803d", bar: 4 },
  "已取消":   { icon: "❌", color: "background:#f3f4f6;color:#6b7280", bar: 0 },
  "申請取消中": { icon: "📋", color: "background:#ffedd5;color:#c2410c", bar: 2 },
};
const STEPS = ["待處理", "處理中", "已出貨", "已完成"];

// ── Tab 切換 ─────────────────────────────────────────
window.switchTab = (n) => {
  document.getElementById("panel1").style.display = n === 1 ? "block" : "none";
  document.getElementById("panel2").style.display = n === 2 ? "block" : "none";
  document.getElementById("tab1").style.borderBottom = n===1 ? "2px solid var(--black)" : "2px solid transparent";
  document.getElementById("tab1").style.color = n===1 ? "var(--black)" : "var(--gray-400)";
  document.getElementById("tab2").style.borderBottom = n===2 ? "2px solid var(--black)" : "2px solid transparent";
  document.getElementById("tab2").style.color = n===2 ? "var(--black)" : "var(--gray-400)";
};

// ── Tab 1：訂單編號查詢 ───────────────────────────────
window.queryByOrder = async () => {
  const orderId = document.getElementById("orderInput").value.trim();
  const el      = document.getElementById("result1");
  if (!orderId) { el.innerHTML = `<div style="padding:16px 0;text-align:center;color:var(--red);font-size:15px">請輸入訂單編號</div>`; return; }

  el.innerHTML = `<div style="padding:40px 0;text-align:center;color:var(--gray-400);font-size:15px">查詢中...</div>`;

  try {
    const res  = await fetch(`${QUERY_API}&orderId=${encodeURIComponent(orderId)}`);
    const data = await res.json();

    if (!res.ok) {
      el.innerHTML = notFoundHTML("找不到此訂單，請確認訂單編號是否正確");
      return;
    }

    // 查客戶資料
    const customer = await fetchCustomer(data.customerId);
    const order    = { ...customer, ...data, customerPageId: customer.pageId };
    el.innerHTML   = renderOrderDetail(order);

  } catch (err) {
    el.innerHTML = `<div style="padding:16px 0;text-align:center;color:var(--red);font-size:15px">查詢失敗，請稍後再試</div>`;
  }
};

// ── Tab 2：客戶編號 + Email ───────────────────────────
window.queryByCustomer = async () => {
  const customerId = document.getElementById("customerInput").value.trim();
  const email      = document.getElementById("emailInput").value.trim();
  const el         = document.getElementById("result2");

  if (!customerId || !email) {
    el.innerHTML = `<div style="padding:16px 0;text-align:center;color:var(--red);font-size:15px">請填寫客戶編號和 Email</div>`;
    return;
  }

  el.innerHTML = `<div style="padding:40px 0;text-align:center;color:var(--gray-400);font-size:15px">驗證中...</div>`;

  try {
    const res  = await fetch(
      `${CUSTOMER_API_URL}&customerId=${encodeURIComponent(customerId)}&email=${encodeURIComponent(email)}`
    );
    const data = await res.json();

    if (!res.ok) {
      el.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;padding:40px 0;color:var(--gray-400)">
          <div style="font-size:48px;margin-bottom:12px">🔒</div>
          <div style="font-size:14px;font-weight:500;color:var(--gray-600)">${data.error || "驗證失敗"}</div>
          <div class="text-xs mt-1">請確認客戶編號和 Email 是否正確</div>
        </div>`;
      return;
    }
    window._lastCustomerData = data; // 存起來供 editBundle 用

    if (!data.orders?.length) {
      el.innerHTML = `<div style="padding:40px 0;text-align:center;color:var(--gray-400);font-size:15px">目前沒有訂單紀錄</div>`;
      return;
    }

    el.innerHTML = `
      <!-- 客戶資訊 -->
      <div style="background:var(--white);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span class="text-xs font-semibold text-gray-500">客戶資料</span>
          <span style="font-size:13px;color:#2563eb;font-weight:700">${customerId}</span>
        </div>
        <div style="font-size:15px;font-weight:500">${data.customer.name || "—"}</div>
        <div class="text-xs text-gray-400 mt-0.5">${data.customer.address || "—"}</div>
      </div>

      <!-- 訂單列表（集運群組化）-->
      <div class="space-y-3">
        ${(() => {
          // 先把有 bundleId 的訂單群組化
          const bundles = {};
          const singles = [];
          data.orders.forEach(o => {
            if (o.bundleId) {
              if (!bundles[o.bundleId]) bundles[o.bundleId] = [];
              bundles[o.bundleId].push(o);
            } else {
              singles.push(o);
            }
          });

          const renderOrder = (o, inBundle = false) => {
            const st   = STATUS_MAP[o.status] || STATUS_MAP["待處理"];
            const date = new Date(o.createdAt);
            const dateStr = (date.getMonth()+1) + "/" + date.getDate() + " " +
              String(date.getHours()).padStart(2,"0") + ":" + String(date.getMinutes()).padStart(2,"0");
            const firstItem = Array.isArray(o.items)
              ? (o.items[0] ? `${o.items[0].name}${o.items.length > 1 ? ` 等 ${o.items.length} 件` : ""}` : "")
              : (o.items?.split("\n")[0] || "");
            const canBundle = o.status === "待處理" && !o.bundleId;
            return `
              <div class="${inBundle ? "border-b last:border-0 px-4 py-3" : "bg-white rounded-xl border px-4 py-3"} transition ${canBundle && !inBundle ? "hover:border-pink-300" : ""}">
                <div style="display:flex;align-items:flex-start;gap:10px">
                  ${canBundle ? `
                  <label style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;cursor:pointer;gap:3px;margin-top:2px" title="勾選加入集運">
                    <input type="checkbox" value="${o.pageId}" data-total="${o.total}" data-discount="${o.discount || 0}"
                      onchange="toggleMergeOrder(this)"
                      class="w-4 h-4 accent-black cursor-pointer">
                    <span class="text-gray-400" style="font-size:9px">集運</span>
                  </label>` : `<div class="w-5 shrink-0"></div>`}
                  <div style="flex:1;min-width:0;cursor:pointer" onclick="showOrderDetail('${o.orderId}', ${JSON.stringify(data.customer).replace(/"/g,'&quot;')})">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start">
                      <div style="min-width:0">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                          <span style="font-size:15px;font-weight:700">${o.orderId}</span>
                          <span style="font-size:12px;padding:3px 10px;border-radius:var(--radius-sm);${st.color}">${o.status}</span>
                        </div>
                        <div class="text-xs text-gray-400 truncate max-w-[180px]">${firstItem}</div>
                      </div>
                      <div style="text-align:right;flex-shrink:0;margin-left:8px">
                        <div style="font-size:15px;font-weight:700;color:var(--black)">NT$ ${Math.round(o.total||0).toLocaleString()}</div>
                        <div style="font-size:12px;color:var(--gray-400)">${dateStr}</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>`;
          };

          // 渲染集運群組
          const bundleHtml = Object.entries(bundles).map(([bundleId, orders]) => {
            const bundleTotal  = orders.reduce((s, o) => s + (o.total || 0), 0);
            const DISCOUNT_MIN = 3000, DISCOUNT_AMT = 200, FREE_AMOUNT = 5000;
            const hasDisc      = orders.some(o => o.discount > 0);
            const discount     = (!hasDisc && bundleTotal >= DISCOUNT_MIN) ? DISCOUNT_AMT : 0;
            const afterDisc    = bundleTotal - discount;
            const shipping     = afterDisc >= FREE_AMOUNT ? 0 : 200;
            const grandTotal   = afterDisc + shipping;
            const shortId      = bundleId.replace("BUNDLE", "");
            return `
              <div style="background:var(--white);border-radius:var(--radius-lg);border:2px solid #bfdbfe;overflow:hidden">
                <div style="background:#eff6ff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center">
                  <div style="display:flex;align-items:center;gap:8px">
                    <span style="font-size:15px">📦</span>

                  <span>小計 NT$ ${Math.floor(bundleTotal).toLocaleString()}${discount > 0 ? ` 折 NT$${discount}` : ""}</span>
                  <span>${afterDisc >= FREE_AMOUNT ? "✅ 已達免手續費門檻" : `還差 NT$ ${Math.ceil(FREE_AMOUNT - afterDisc).toLocaleString()} 免手續費`}</span>
                </div>
              </div>`;
          }).join("");

          // 渲染單筆訂單

// ── 訂單詳情 HTML ─────────────────────────────────────
function renderOrderDetail(data) {
  const status  = STATUS_MAP[data.status] || STATUS_MAP["待處理"];
  const current = STEPS.indexOf(data.status);
  const date    = new Date(data.createdAt);
  const dateStr = `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,"0")}:${String(date.getMinutes()).padStart(2,"0")}`;

  const stepsHtml = STEPS.map((step, i) => {
    const done    = i <= current;
    const isCurrent = i === current;
    return `
      <div class="flex flex-col items-center flex-1">
        <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold mb-1
          ${done ? "bg-black text-white" : "bg-gray-200 text-gray-400"}
          ${isCurrent ? "ring-2 ring-black ring-offset-2" : ""}">
          ${done && !isCurrent ? "✓" : i + 1}
        </div>
        <span class="text-xs ${isCurrent ? "font-bold text-black" : "text-gray-400"}">${step}</span>
      </div>
      ${i < STEPS.length - 1 ? `<div class="flex-1 h-0.5 mt-3.5 ${i < current ? "bg-black" : "bg-gray-200"}"></div>` : ""}`;
  }).join("");

  // 支援 JSON 陣列（新格式）和純文字（舊格式）
  let itemsHtml = "";
  if (Array.isArray(data.items) && data.items.length) {
    itemsHtml = data.items.map(i => `
      <div class="py-2 border-b last:border-0">
        <div class="flex justify-between items-start text-sm">
          <span class="text-gray-700 flex-1 mr-2">${i.name}${i.variant ? ` <span style="font-size:12px;color:var(--gray-400)">（${i.variant}）</span>` : ""} × ${i.qty}</span>
          <span class="text-gray-600 font-medium shrink-0">${formatPrice(i.price * i.qty)}</span>
        </div>
        <div class="text-xs text-gray-400 mt-0.5">單價 ${formatPrice(i.price)}</div>
      </div>`).join("");
  } else {
    const text = typeof data.items === "string" ? data.items : "";
    itemsHtml = text.split("\n").filter(Boolean).map(line => `
      <div class="flex justify-between py-2 text-sm border-b last:border-0">
        <span class="text-gray-700">${line.split("（")[0].trim()}</span>
        <span class="text-gray-500">${line.match(/（(.+)）/)?.[1] || ""}</span>
      </div>`).join("");
  }

  return `
    <div class="bg-white rounded-xl border px-4 py-4 mb-3">
      <div class="flex justify-between items-start mb-3">
        <div>
          <div class="text-xs text-gray-400 mb-0.5">訂單編號</div>
          <div class="font-bold tracking-wider">${data.orderId}</div>
        </div>
        <span class="text-xs px-2.5 py-1 rounded-full font-medium ${status.color}">
          ${status.icon} ${data.status}
        </span>
      </div>
      <div style="font-size:12px;color:var(--gray-400)">下單時間：${dateStr}</div>
    </div>

    <div class="bg-white rounded-xl border px-4 py-5 mb-3">
      <div class="text-xs font-semibold text-gray-500 mb-4">訂單進度</div>
      <div class="flex items-start">${stepsHtml}</div>
    </div>

    <div class="bg-white rounded-xl border px-4 py-4 mb-3">
      <div style="font-size:13px;font-weight:700;color:var(--gray-600);margin-bottom:8px">訂單明細</div>
      ${itemsHtml}
      ${data.discount > 0 ? `
      <div class="flex justify-between items-center py-2 text-sm text-green-600">
        <span>🎉 滿NT$3,000折扣</span>
        <span>- NT$200</span>
      </div>` : ""}
      ${data.shipping > 0 ? `
      <div class="flex justify-between items-center py-2 text-sm text-gray-500">
        <span>出貨手續費</span>
        <span>NT$${data.shipping}</span>
      </div>` : data.shipping === 0 && data.total > 0 ? `
      <div class="flex justify-between items-center py-2 text-sm text-green-600">
        <span>出貨手續費</span>
        <span>免手續費</span>
      </div>` : ""}
      <div class="flex justify-between items-center pt-3 font-bold border-t">
        <span>合計</span>
        <span class="text-red-500">${formatPrice(data.total)}</span>
      </div>
    </div>

    <div class="bg-white rounded-xl border px-4 py-4">
      <div class="flex justify-between items-center mb-2">
        <div class="text-xs font-semibold text-gray-500">收件資料</div>
        ${data.customerId ? `<span class="text-xs text-blue-500 font-medium">${data.customerId}</span>` : ""}
      </div>
      <div class="text-sm text-gray-700 space-y-1">
        <div>${data.name || "—"}</div>
        ${data.phone ? `<div class="text-gray-500 text-xs">${data.phone}</div>` : ""}
        <div class="text-gray-400 text-xs">${data.address || "—"}</div>
      </div>
    </div>

    <!-- 操作按鈕（待處理或處理中才顯示）-->
    ${["待處理","處理中"].includes(data.status) ? `
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px">
      ${data.status === "待處理" && Array.isArray(data.items) ? `
      <button onclick="openItemsModal('${encodeData({pageId:data.pageId,status:data.status})}', ${JSON.stringify(data.items).replace(/"/g, '&quot;')})"
        class="w-full py-2.5 border rounded-xl text-sm text-gray-600 hover:bg-gray-50 transition">
        🛒 修改商品數量 / 刪除商品
      </button>` : ""}
      <div style="display:flex;gap:8px">
        <button onclick="openEditModal('${encodeData({customerId:data.customerId,name:data.name,phone:data.phone,address:data.address,status:data.status})}')"
          class="flex-1 py-2.5 border rounded-xl text-sm text-gray-600 hover:bg-gray-50 transition">
          ✏️ 修改收件資料
        </button>
        <button onclick="openCancelModal('${encodeData({pageId:data.pageId,orderId:data.orderId,status:data.status})}')"
          class="flex-1 py-2.5 border border-red-200 rounded-xl text-sm text-red-400 hover:bg-red-50 transition">
          ${data.status === "待處理" ? "❌ 取消訂單" : "📋 申請取消"}
        </button>
      </div>
    </div>` : ""}`;
}

function encodeData(obj) {
  return encodeURIComponent(JSON.stringify(obj));
}

  return `
    <div class="flex flex-col items-center py-10 text-gray-400">
      <div style="font-size:48px;margin-bottom:12px">🔍</div>

}

<script>
function toggleSearch() {
  const box = document.getElementById("searchBox");
  const isHidden = box.classList.contains("hidden");
  box.classList.toggle("hidden", !isHidden);
  box.classList.toggle("flex", isHidden);
  if (isHidden) setTimeout(() => document.getElementById("navSearchInput").focus(), 50);
  else closeSearch();
}
function closeSearch() {
  const box = document.getElementById("searchBox");
  box.classList.add("hidden"); box.classList.remove("flex");
  document.getElementById("navSearchInput").value = "";
}
function onNavSearch(val) {}
document.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("navSearchInput");
  if (!input) return;
  let isComposing = false;
  input.addEventListener("compositionstart", () => { isComposing = true; });
  input.addEventListener("compositionend", () => {
    isComposing = false;
    if (input.value.trim()) window.location.href = "search.html?q=" + encodeURIComponent(input.value.trim());
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !isComposing && input.value.trim())
      window.location.href = "search.html?q=" + encodeURIComponent(input.value.trim());
  });
});
document.addEventListener("click", (e) => {
  const wrap = document.getElementById("searchWrap");
  if (wrap && !wrap.contains(e.target)) closeSearch();
});
</script>

<script>
const ORDERS_API_MOD   = "https://shoptest-chi.vercel.app/api/orders-manage";
const CUSTOMER_API_MOD = "https://shoptest-chi.vercel.app/api/customer";
let _editData = null, _cancelData = null, _itemsData = null;

// ── 修改商品 ─────────────────────────────────────────
window.openItemsModal = (encoded, itemsJson) => {
  _itemsData = JSON.parse(decodeURIComponent(encoded));
  const rawItems = typeof itemsJson === 'string' ? JSON.parse(itemsJson) : itemsJson;
  // 記錄來源訂單的 orderId 供儲存後重新查詢用
  window._lastOpenedOrderId = _itemsData._orderId || "";
  // 直接用訂單裡儲存的 price（下單當時計算好的，含優惠碼）
  _itemsData._editItems = JSON.parse(JSON.stringify(rawItems));
  document.getElementById("itemsSaveStatus").classList.add("hidden");
  document.getElementById("itemsModal").style.display="flex";
  document.body.style.overflow = "hidden";
  renderItemsEditor();
};

function closeItemsModal() {
  document.getElementById("itemsModal").style.display="none";
  document.body.style.overflow = "";
  // 重置按鈕狀態
  const btn = document.getElementById("itemsSaveBtn");
  if (btn) { btn.disabled = false; btn.textContent = "儲存變更"; }
  document.getElementById("itemsSaveStatus").classList.add("hidden");
}

function renderItemsEditor() {
  const items = _itemsData._editItems;
  const FLAT = 200, FREE = 5000, DISCOUNT_MIN = 3000, DISCOUNT_AMT = 200;
  const subtotal  = items.reduce((s, i) => s + i.price * i.qty, 0);
  const discount  = subtotal >= DISCOUNT_MIN ? DISCOUNT_AMT : 0;
  const afterDisc = subtotal - discount;
  const shipping  = afterDisc >= FREE ? 0 : FLAT;
  const total     = afterDisc + shipping;

  document.getElementById("itemsNewTotal").textContent = "NT$" + Math.floor(total).toLocaleString();
  const detailParts = [`小計 NT$${Math.floor(subtotal).toLocaleString()}`];
  if (discount > 0) detailParts.push(`折扣 -NT$${discount}`);
  detailParts.push(shipping === 0 ? "免出貨手續費" : `出貨手續費 NT$${shipping}`);
  const detailEl = document.getElementById("itemsDetail");
  if (detailEl) detailEl.textContent = detailParts.join(" → ");

  document.getElementById("itemsEditor").innerHTML = items.map((item, idx) => `
    <div class="flex items-center gap-3 border rounded-xl p-3 ${item.qty === 0 ? "opacity-40" : ""}">
      <div style="flex:1;min-width:0">
        <div style="font-size:15px;font-weight:600">${item.name}${item.variant ? ` <span style="font-size:12px;color:var(--gray-400)">（${item.variant}）</span>` : ""}</div>
        <div class="text-xs text-gray-400 mt-0.5">
          ${item.idnumber ? `<span class="text-gray-300">#${item.idnumber}</span> · ` : ""}NT$${Math.floor(item.price).toLocaleString()} / 件
        </div>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <div style="display:flex;align-items:center;border:1px solid var(--gray-200);border-radius:var(--radius-sm);overflow:hidden">
          <button onclick="changeItemQty(${idx}, -1)"
            class="w-8 h-8 flex items-center justify-center text-lg hover:bg-gray-100 transition">−</button>
          <span style="width:36px;text-align:center;font-size:15px;font-weight:600;border-left:1px solid var(--gray-200);border-right:1px solid var(--gray-200)">${item.qty}</span>
          <button onclick="changeItemQty(${idx}, 1)"
            class="w-8 h-8 flex items-center justify-center text-lg hover:bg-gray-100 transition">＋</button>
        </div>
        <button onclick="removeItem2(${idx})"
          style="background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:20px;padding:4px">✕</button>
      </div>
    </div>`).join("");
}

window.changeItemQty = (idx, delta) => {
  const item = _itemsData._editItems[idx];
  item.qty = Math.max(0, item.qty + delta);
  renderItemsEditor();
};

window.removeItem2 = (idx) => {
  _itemsData._editItems.splice(idx, 1);
  renderItemsEditor();
};

async function saveItems() {
  const items = _itemsData._editItems.filter(i => i.qty > 0);
  if (!items.length) { alert("至少保留一件商品"); return; }

  const FLAT = 200, FREE = 5000, DISCOUNT_MIN = 3000, DISCOUNT_AMT = 200;
  const subtotal   = items.reduce((s, i) => s + i.price * i.qty, 0);
  const discount   = subtotal >= DISCOUNT_MIN ? DISCOUNT_AMT : 0;
  const afterDisc  = subtotal - discount;
  const shipping   = afterDisc >= FREE ? 0 : FLAT;
  const total      = afterDisc + shipping;

  const btn    = document.getElementById("itemsSaveBtn");
  const status = document.getElementById("itemsSaveStatus");
  btn.disabled = true; btn.textContent = "儲存中...";

  try {
    const res  = await fetch(ORDERS_API_MOD, {
      method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pageId: _itemsData.pageId, items, total, shipping, discount }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    status.textContent = "✅ 已更新！";
    status.className   = "text-xs text-center text-green-600";
    status.classList.remove("hidden");
    closeItemsModal();
    await refreshCurrentOrder();
  } catch (err) {
    status.textContent = "❌ " + err.message;
    status.className   = "text-xs text-center text-red-500";
    status.classList.remove("hidden");
    btn.disabled = false; btn.textContent = "儲存變更";
  }
}

// ── 重新載入當前訂單 ─────────────────────────────────
async function refreshCurrentOrder() {
  const orderInput    = document.getElementById("orderInput")?.value.trim();
  const customerInput = document.getElementById("customerInput")?.value.trim();
  if (customerInput) {
    await window.queryByCustomer();
    // 如果是在訂單詳情頁，重新載入詳情
    if (window._currentDetailOrderId && window._currentDetailCustomer) {
      await window.showOrderDetail(window._currentDetailOrderId, window._currentDetailCustomer);
    }
  } else if (orderInput) {
    await window.queryByOrder();
    // queryByOrder 已自動更新 result1 的訂單詳情
  }
}

window.openEditModal = (encoded) => {
  _editData = JSON.parse(decodeURIComponent(encoded));
  document.getElementById("editName").value    = _editData.name    || "";
  document.getElementById("editPhone").value   = _editData.phone   || "";
  document.getElementById("editAddress").value = _editData.address || "";
  document.getElementById("editStatus").classList.add("hidden");
  document.getElementById("editModal").style.display="flex";
  document.body.style.overflow = "hidden";
};
function closeEditModal() {
  document.getElementById("editModal").style.display="none";
  document.body.style.overflow = "";
}
async function submitEditCustomer() {
  const name    = document.getElementById("editName").value.trim();
  const phone   = document.getElementById("editPhone").value.trim();
  const address = document.getElementById("editAddress").value.trim();
  const status  = document.getElementById("editStatus");
  if (!name || !phone || !address) {
    status.textContent = "請填寫所有欄位";
    status.className   = "text-xs text-center text-red-500";
    status.classList.remove("hidden"); return;
  }
  try {
    const res  = await fetch(CUSTOMER_API_MOD, {
      method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ customerId: _editData.customerId, name, phone, address }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    status.textContent = "✅ 已更新！";
    status.className   = "text-xs text-center text-green-600";
    status.classList.remove("hidden");
    setTimeout(() => { closeEditModal(); refreshCurrentOrder(); }, 1000);
  } catch (err) {
    status.textContent = "❌ " + err.message;
    status.className   = "text-xs text-center text-red-500";
    status.classList.remove("hidden");
  }
}

window.openCancelModal = (encoded) => {
  _cancelData = JSON.parse(decodeURIComponent(encoded));
  const isPending = _cancelData.status === "待處理";
  document.getElementById("cancelTitle").textContent = isPending ? "取消訂單" : "申請取消";
  document.getElementById("cancelDesc").textContent  = isPending
    ? `確定要取消訂單 ${_cancelData.orderId}？此操作無法復原。`
    : `訂單 ${_cancelData.orderId} 目前處理中，送出申請後將等待店家確認。`;
  document.getElementById("cancelStatus").classList.add("hidden");
  document.getElementById("cancelConfirmBtn").disabled = false;
  document.getElementById("cancelConfirmBtn").textContent = "確認";
  document.getElementById("cancelModal").style.display="flex";
  document.body.style.overflow = "hidden";
};
function closeCancelModal() {
  document.getElementById("cancelModal").style.display="none";
  document.body.style.overflow = "";
}
async function submitCancel() {
  const btn    = document.getElementById("cancelConfirmBtn");
  const status = document.getElementById("cancelStatus");
  btn.disabled = true; btn.textContent = "處理中...";
  try {
    const isPending = _cancelData.status === "待處理";
    const newStatus = isPending ? "已取消" : "申請取消中";
    const res  = await fetch(ORDERS_API_MOD, {
      method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pageId: _cancelData.pageId, status: newStatus }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    status.textContent = isPending ? "✅ 訂單已取消" : "✅ 申請已送出，請等待通知";
    status.className   = "text-xs text-center text-green-600";
    status.classList.remove("hidden");
    btn.textContent = "完成";
    setTimeout(() => {
      closeCancelModal();
      if (isPending) {
        location.href = "index.html";
      } else {
        refreshCurrentOrder();
      }
    }, 1500);
  } catch (err) {
    status.textContent = "❌ " + err.message;
    status.className   = "text-xs text-center text-red-500";
    status.classList.remove("hidden");
    btn.disabled = false; btn.textContent = "確認";
  }
}

// ── 編輯集運批次 ─────────────────────────────────────
let _editBundleId   = null;
let _editBundleData = null; // { bundleOrders, allOrders, customer }

window.openEditBundleById = async (bundleId) => {
  _editBundleId = bundleId;

  // 直接用剛查詢過的快取資料
  if (!window._lastCustomerData) return;
  _editBundleData = window._lastCustomerData;
  renderEditBundleModal(bundleId, window._lastCustomerData);
  document.getElementById("editBundleModal").style.display="flex";
  document.body.style.overflow = "hidden";
};

function renderEditBundleModal(bundleId, data) {
  const modal = document.getElementById("editBundleModal");
  const shortId = bundleId.replace("BUNDLE", "");
  const bundleOrders  = data.orders.filter(o => o.bundleId === bundleId);
  const freeOrders    = data.orders.filter(o => !o.bundleId && o.status === "待處理");

  document.getElementById("editBundleTitle").textContent = `編輯集運批次 #${shortId}`;

  // 批次內的訂單
  document.getElementById("editBundleIn").innerHTML = bundleOrders.map(o => `
    <div style="display:flex;align-items:center;justify-content:space-between;border:1px solid #bfdbfe;border-radius:var(--radius);padding:10px 12px;background:#eff6ff">
      <div style="min-width:0">
        <div style="font-size:15px;font-weight:600">${o.orderId}</div>
        <div style="font-size:12px;color:var(--gray-400)">NT$ ${Math.floor(o.total||0).toLocaleString()}</div>
      </div>
      <button onclick="removeFromBundle('${o.pageId}')"
        class="text-xs px-2 py-1 border border-red-200 text-red-400 rounded-lg hover:bg-red-50 ml-2 shrink-0">
        移除
      </button>
    </div>`).join("") || '<div class="text-xs text-gray-400 text-center py-2">批次已空</div>';

  // 可加入的訂單
  document.getElementById("editBundleOut").innerHTML = freeOrders.length ? freeOrders.map(o => `
    <div style="display:flex;align-items:center;justify-content:space-between;border:1px solid var(--gray-200);border-radius:var(--radius);padding:10px 12px">
      <div style="min-width:0">
        <div style="font-size:15px;font-weight:600">${o.orderId}</div>
        <div style="font-size:12px;color:var(--gray-400)">NT$ ${Math.floor(o.total||0).toLocaleString()}</div>
      </div>
      <button onclick="addToBundle('${o.pageId}')"
        class="text-xs px-2 py-1 border border-blue-200 text-blue-500 rounded-lg hover:bg-blue-50 ml-2 shrink-0">
        加入
      </button>
    </div>`).join("") : '<div class="text-xs text-gray-400 text-center py-2">沒有可加入的訂單</div>';
}

async function removeFromBundle(pageId) {
  try {
    // 移除這筆
    await fetch(ORDERS_API_MOD, {
      method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pageId, bundleId: "" }),
    });

    // 如果批次只剩 1 筆，把最後一筆也移除（變回單獨訂單）
    const remaining = (_editBundleData?.orders || [])
      .filter(o => o.bundleId === _editBundleId && o.pageId !== pageId);
    if (remaining.length === 1) {
      await fetch(ORDERS_API_MOD, {
        method: "PATCH", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pageId: remaining[0].pageId, bundleId: "" }),
      });
    }

    closeEditBundleModal();
    window.queryByCustomer();
  } catch (err) { alert("操作失敗：" + err.message); }
}

async function addToBundle(pageId) {
  try {
    await fetch(ORDERS_API_MOD, {
      method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pageId, bundleId: _editBundleId }),
    });
    closeEditBundleModal();
    window.queryByCustomer();
  } catch (err) { alert("操作失敗：" + err.message); }
}

function closeEditBundleModal() {
  document.getElementById("editBundleModal").style.display="none";
  document.body.style.overflow = "";
}

// ── 集運合併（訂單查詢頁）────────────────────────────
let _mergeSelected = new Set();

window.toggleMergeOrder = (checkbox) => {
  const pageId = checkbox.value;
  if (checkbox.checked) _mergeSelected.add(pageId);
  else _mergeSelected.delete(pageId);
  updateMergeArea();
};

function updateMergeArea() {
  const area = document.getElementById("mergeArea");
  const summary = document.getElementById("mergeSummary");
  if (!area || !summary) return;

  if (_mergeSelected.size < 2) {
    area.classList.add("hidden");
    return;
  }

  // 計算合計
  let total = 0;
  let hasDiscounted = false;
  document.querySelectorAll("input[type=checkbox][data-total]:checked").forEach(cb => {
    total += Number(cb.dataset.total) || 0;
    if (Number(cb.dataset.discount) > 0) hasDiscounted = true;
  });

  const DISCOUNT_MIN = 3000, DISCOUNT_AMT = 200, FREE_AMOUNT = 5000;
  const discount = (!hasDiscounted && total >= DISCOUNT_MIN) ? DISCOUNT_AMT : 0;
  const afterDiscount = total - discount;
  const shipping = afterDiscount >= FREE_AMOUNT ? 0 : 200;
  const grandTotal = afterDiscount + shipping;

  summary.innerHTML = `
    <div class="space-y-1 text-sm">
      <div class="flex justify-between"><span class="text-gray-500">選取 ${_mergeSelected.size} 筆訂單</span><span>NT$${Math.floor(total).toLocaleString()}</span></div>
      ${discount > 0 ? `<div class="flex justify-between text-green-600"><span>🎉 滿NT$3,000折扣</span><span>- NT$200</span></div>` : ""}
      <div class="flex justify-between ${shipping === 0 ? "text-green-600" : "text-gray-500"}"><span>出貨手續費</span><span>${shipping === 0 ? "免費" : "NT$" + shipping}</span></div>
      <div class="flex justify-between font-bold pt-1 border-t"><span>合計</span><span class="text-red-500">NT$${Math.floor(grandTotal).toLocaleString()}</span></div>
    </div>`;

  area.classList.remove("hidden");
}

async function confirmMerge() {
  if (_mergeSelected.size < 2) { alert("請至少選擇 2 筆訂單"); return; }

  const btn = document.querySelector("#mergeArea button");
  btn.disabled = true; btn.textContent = "處理中...";

  try {
    const bundleId = "BUNDLE" + Date.now().toString().slice(-8);
    const pageIds  = [..._mergeSelected];

    await Promise.all(pageIds.map(pageId =>
      fetch(ORDERS_API_MOD, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pageId, bundleId }),
      })
    ));

    btn.textContent = "✅ 集運合併成功！";
    setTimeout(() => {
      _mergeSelected.clear();
      window.queryByCustomer();
    }, 1200);
  } catch (err) {
    alert("集運失敗：" + err.message);
    btn.disabled = false; btn.textContent = "確認集運合併";
  }
}

</script>
