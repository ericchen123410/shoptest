<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單查詢</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<div class="sticky top-0 z-50 bg-white border-b shadow-sm">
  <div class="flex justify-between items-center px-4 py-2 max-w-7xl mx-auto">
    <div class="flex items-center gap-1">
      <a href="index.html" class="font-bold px-2 py-1.5 rounded-lg hover:bg-gray-100 text-sm">🏠 <span class="hidden lg:inline">首頁</span></a>
      <a href="new.html"   class="px-2 py-1.5 rounded-lg hover:bg-gray-100 text-xs lg:text-sm">🆕 <span class="hidden sm:inline">新品</span></a>
      <a href="hot.html"   class="px-2 py-1.5 rounded-lg hover:bg-gray-100 text-xs lg:text-sm">🔥 <span class="hidden sm:inline">熱賣</span></a>
      <a href="sale.html"  class="px-2 py-1.5 rounded-lg hover:bg-gray-100 text-xs lg:text-sm">🈹 <span class="hidden sm:inline">特價</span></a>
    </div>
    <div class="flex items-center gap-1">
      <div id="searchWrap" class="flex items-center">
        <div id="searchBox" class="hidden items-center gap-1 bg-gray-50 border rounded-xl px-2 py-1 mr-1 transition-all">
          <input id="navSearchInput" type="text" placeholder="搜尋商品… (Enter)"
            class="bg-transparent text-sm outline-none w-36 sm:w-48"
            onkeydown="if(event.key==='Escape') closeSearch()">
          <button onclick="closeSearch()" class="text-gray-400 hover:text-black text-sm leading-none">✕</button>
        </div>
        <button onclick="toggleSearch()" id="searchToggleBtn"
          class="px-2 py-1.5 rounded-lg hover:bg-gray-100 text-base">🔍</button>
      </div>
      <a href="about.html" class="px-2 py-1.5 rounded-lg hover:bg-gray-100 text-xs lg:text-sm">ℹ️ <span class="hidden sm:inline">關於我們</span></a>
      <a href="order-status.html" class="px-2 py-1.5 rounded-lg hover:bg-gray-100 text-xs lg:text-sm">📋 <span class="hidden sm:inline">訂單查詢</span></a>
      <button onclick="history.back()" class="px-2 py-1.5 rounded-lg hover:bg-gray-100 text-sm">⬅️</button>
      <a href="cart.html" class="px-2 py-1.5 rounded-lg hover:bg-gray-100 text-sm">
        🛒 <span id="cartCount" class="bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full">0</span>
      </a>
    </div>
  </div>
  <div id="searchDropdown" class="hidden"></div>
</div>

<div class="px-4 py-6 max-w-xl mx-auto">

  <h1 class="text-xl font-bold mb-1 text-gray-900">訂單查詢</h1>
  <p class="text-sm text-gray-400 mb-5">查詢您的訂單狀態</p>

  <!-- Tab 切換 -->
  <div class="flex gap-2 mb-5 border-b">
    <button id="tab1" onclick="switchTab(1)"
      class="pb-2.5 px-1 text-sm font-medium border-b-2 border-black text-black transition">
      訂單編號查詢
    </button>
    <button id="tab2" onclick="switchTab(2)"
      class="pb-2.5 px-1 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition">
      客戶編號查詢
    </button>
  </div>

  <!-- Tab 1：訂單編號 -->
  <div id="panel1">
    <div class="flex gap-2 mb-4">
      <input id="orderInput" type="text"
        placeholder="請輸入訂單編號，例如 ORD12345678"
        class="flex-1 border rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black uppercase"
        oninput="this.value = this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter') queryByOrder()">
      <button onclick="queryByOrder()"
        class="px-5 py-3 bg-black text-white rounded-xl text-sm font-medium active:bg-gray-800 shrink-0">
        查詢
      </button>
    </div>
    <div id="result1"></div>
  </div>

  <!-- Tab 2：客戶編號 + Email -->
  <div id="panel2" class="hidden">
    <div class="space-y-3 mb-4">
      <input id="customerInput" type="text"
        placeholder="客戶編號，例如 W-82I"
        class="w-full border rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black uppercase"
        oninput="this.value = this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter') queryByCustomer()">
      <input id="emailInput" type="email"
        placeholder="您的 Email"
        class="w-full border rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black"
        onkeydown="if(event.key==='Enter') queryByCustomer()">
      <button onclick="queryByCustomer()"
        class="w-full py-3 bg-black text-white rounded-xl text-sm font-medium active:bg-gray-800">
        查詢我的訂單
      </button>
    </div>
    <div id="result2"></div>
  </div>

</div>

<script src="./js/cartCount.js"></script>
<script type="module">
import { formatPrice } from "./js/utils.js";

const QUERY_API    = "https://shoptest-chi.vercel.app/api/orders-manage?type=query";
const CUSTOMER_API_URL = "https://shoptest-chi.vercel.app/api/orders-manage?type=customer";

const STATUS_MAP = {
  "待處理":   { icon: "🕐", color: "bg-yellow-100 text-yellow-700", bar: 1 },
  "處理中":   { icon: "📦", color: "bg-blue-100 text-blue-600",    bar: 2 },
  "已出貨":   { icon: "🚚", color: "bg-purple-100 text-purple-600", bar: 3 },
  "已完成":   { icon: "✅", color: "bg-green-100 text-green-600",   bar: 4 },
  "已取消":   { icon: "❌", color: "bg-gray-100 text-gray-400",     bar: 0 },
  "申請取消中": { icon: "📋", color: "bg-orange-100 text-orange-500", bar: 2 },
};
const STEPS = ["待處理", "處理中", "已出貨", "已完成"];

// ── Tab 切換 ─────────────────────────────────────────
window.switchTab = (n) => {
  document.getElementById("panel1").classList.toggle("hidden", n !== 1);
  document.getElementById("panel2").classList.toggle("hidden", n !== 2);
  document.getElementById("tab1").className = `pb-2.5 px-1 text-sm font-medium border-b-2 transition ${n===1 ? "border-black text-black" : "border-transparent text-gray-400 hover:text-gray-600"}`;
  document.getElementById("tab2").className = `pb-2.5 px-1 text-sm font-medium border-b-2 transition ${n===2 ? "border-black text-black" : "border-transparent text-gray-400 hover:text-gray-600"}`;
};

// ── Tab 1：訂單編號查詢 ───────────────────────────────
window.queryByOrder = async () => {
  const orderId = document.getElementById("orderInput").value.trim();
  const el      = document.getElementById("result1");
  if (!orderId) { el.innerHTML = `<div class="text-center text-sm text-red-400 py-4">請輸入訂單編號</div>`; return; }

  el.innerHTML = `<div class="text-center text-gray-400 py-8 text-sm">查詢中...</div>`;

  try {
    const res  = await fetch(`${QUERY_API}&orderId=${encodeURIComponent(orderId)}`);
    const data = await res.json();

    if (!res.ok) {
      el.innerHTML = notFoundHTML("找不到此訂單，請確認訂單編號是否正確");
      return;
    }

    // 查客戶資料
    const customer = await fetchCustomer(data.customerId);
    const order    = { ...customer, ...data, customerPageId: customer.pageId };
    el.innerHTML   = renderOrderDetail(order);

  } catch (err) {
    el.innerHTML = `<div class="text-center text-sm text-red-400 py-4">查詢失敗，請稍後再試</div>`;
  }
};

// ── Tab 2：客戶編號 + Email ───────────────────────────
window.queryByCustomer = async () => {
  const customerId = document.getElementById("customerInput").value.trim();
  const email      = document.getElementById("emailInput").value.trim();
  const el         = document.getElementById("result2");

  if (!customerId || !email) {
    el.innerHTML = `<div class="text-center text-sm text-red-400 py-4">請填寫客戶編號和 Email</div>`;
    return;
  }

  el.innerHTML = `<div class="text-center text-gray-400 py-8 text-sm">驗證中...</div>`;

  try {
    const res  = await fetch(
      `${CUSTOMER_API_URL}&customerId=${encodeURIComponent(customerId)}&email=${encodeURIComponent(email)}`
    );
    const data = await res.json();

    if (!res.ok) {
      el.innerHTML = `
        <div class="flex flex-col items-center py-8 text-gray-400">
          <div class="text-4xl mb-3">🔒</div>
          <div class="text-sm font-medium text-gray-500">${data.error || "驗證失敗"}</div>
          <div class="text-xs mt-1">請確認客戶編號和 Email 是否正確</div>
        </div>`;
      return;
    }
    window._lastCustomerData = data; // 存起來供 editBundle 用

    if (!data.orders?.length) {
      el.innerHTML = `<div class="text-center text-gray-400 py-8 text-sm">目前沒有訂單紀錄</div>`;
      return;
    }

    el.innerHTML = `
      <!-- 客戶資訊 -->
      <div class="bg-white rounded-xl border px-4 py-3 mb-4">
        <div class="flex justify-between items-center mb-1">
          <span class="text-xs font-semibold text-gray-500">客戶資料</span>
          <span class="text-xs text-blue-500 font-bold">${customerId}</span>
        </div>
        <div class="text-sm font-medium text-gray-800">${data.customer.name || "—"}</div>
        <div class="text-xs text-gray-400 mt-0.5">${data.customer.address || "—"}</div>
      </div>

      <!-- 訂單列表（集運群組化）-->
      <div class="space-y-3">
        ${(() => {
          // 先把有 bundleId 的訂單群組化
          const bundles = {};
          const singles = [];
          data.orders.forEach(o => {
            if (o.bundleId) {
              if (!bundles[o.bundleId]) bundles[o.bundleId] = [];
              bundles[o.bundleId].push(o);
            } else {
              singles.push(o);
            }
          });

          const renderOrder = (o, inBundle = false) => {
            const st   = STATUS_MAP[o.status] || STATUS_MAP["待處理"];
            const date = new Date(o.createdAt);
            const dateStr = (date.getMonth()+1) + "/" + date.getDate() + " " +
              String(date.getHours()).padStart(2,"0") + ":" + String(date.getMinutes()).padStart(2,"0");
            const firstItem = Array.isArray(o.items)
              ? (o.items[0] ? `${o.items[0].name}${o.items.length > 1 ? ` 等 ${o.items.length} 件` : ""}` : "")
              : (o.items?.split("\n")[0] || "");
            const canBundle = o.status === "待處理" && !o.bundleId;
            return `
              <div class="${inBundle ? "border-b last:border-0 px-4 py-3" : "bg-white rounded-xl border px-4 py-3"} transition ${canBundle && !inBundle ? "hover:border-pink-300" : ""}">
                <div class="flex items-start gap-3">
                  ${canBundle ? `
                  <input type="checkbox" value="${o.pageId}" data-total="${o.total}" data-discount="${o.discount || 0}"
                    onchange="toggleMergeOrder(this)"
                    class="w-4 h-4 accent-black mt-1 shrink-0 cursor-pointer">` : `<div class="w-4 shrink-0"></div>`}
                  <div class="flex-1 min-w-0 cursor-pointer" onclick="showOrderDetail('${o.orderId}', ${JSON.stringify(data.customer).replace(/"/g,'&quot;')})">
                    <div class="flex justify-between items-start">
                      <div class="min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                          <span class="font-bold text-sm">${o.orderId}</span>
                          <span class="text-xs px-2 py-0.5 rounded-full ${st.color}">${o.status}</span>
                        </div>
                        <div class="text-xs text-gray-400 truncate max-w-[180px]">${firstItem}</div>
                      </div>
                      <div class="text-right shrink-0 ml-2">
                        <div class="font-bold text-red-500 text-sm">NT$ ${Math.round(o.total||0).toLocaleString()}</div>
                        <div class="text-xs text-gray-400">${dateStr}</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>`;
          };

          // 渲染集運群組
          const bundleHtml = Object.entries(bundles).map(([bundleId, orders]) => {
            const bundleTotal  = orders.reduce((s, o) => s + (o.total || 0), 0);
            const DISCOUNT_MIN = 3000, DISCOUNT_AMT = 200, FREE_AMOUNT = 5000;
            const hasDisc      = orders.some(o => o.discount > 0);
            const discount     = (!hasDisc && bundleTotal >= DISCOUNT_MIN) ? DISCOUNT_AMT : 0;
            const afterDisc    = bundleTotal - discount;
            const shipping     = afterDisc >= FREE_AMOUNT ? 0 : 200;
            const grandTotal   = afterDisc + shipping;
            const shortId      = bundleId.replace("BUNDLE", "");
            return `
              <div class="bg-white rounded-xl border-2 border-blue-200 overflow-hidden">
                <div class="bg-blue-50 px-4 py-2 flex justify-between items-center">
                  <div class="flex items-center gap-2">
                    <span class="text-sm">📦</span>
                    <span class="text-xs font-bold text-blue-600">集運批次 #${shortId}</span>
                    <span class="text-xs text-blue-400">${orders.length} 筆訂單</span>
                  </div>
                  <div class="flex items-center gap-2">
                    <div class="text-right">
                      <div class="text-xs font-bold text-blue-600">NT$ ${Math.floor(grandTotal).toLocaleString()}</div>
                      <div class="text-xs text-blue-400">${shipping === 0 ? "免手續費 ✅" : "運費 NT$" + shipping}</div>
                    </div>
                    ${orders.every(o => o.status === "待處理") ? `
                    <button onclick="event.stopPropagation(); openEditBundleById('${bundleId}')"
                      class="text-xs px-2 py-1 bg-white border border-blue-200 text-blue-500 rounded-lg hover:bg-blue-50 transition shrink-0">
                      ✏️ 編輯
                    </button>` : ""}
                  </div>
                </div>
                ${orders.map(o => renderOrder(o, true)).join("")}
                <div class="bg-blue-50 px-4 py-2 text-xs text-blue-400 flex justify-between">
                  <span>小計 NT$ ${Math.floor(bundleTotal).toLocaleString()}${discount > 0 ? ` 折 NT$${discount}` : ""}</span>
                  <span>${afterDisc >= FREE_AMOUNT ? "✅ 已達免運門檻" : `還差 NT$ ${Math.ceil(FREE_AMOUNT - afterDisc).toLocaleString()} 免運`}</span>
                </div>
              </div>`;
          }).join("");

          // 渲染單筆訂單
          const singlesHtml = singles.map(o => renderOrder(o, false)).join("");

          return bundleHtml + singlesHtml;
        })()}
      </div>

      <!-- 集運合併區 -->
      <div id="mergeArea" class="hidden mt-3 bg-white border rounded-xl p-4">
        <div class="text-xs font-semibold text-gray-500 mb-2">集運合併</div>
        <div id="mergeSummary" class="text-sm text-gray-600 mb-3"></div>
        <button onclick="confirmMerge()"
          class="w-full py-3 bg-black text-white font-medium rounded-xl text-sm hover:bg-gray-800 transition">
          確認集運合併
        </button>
      </div>`;

  } catch (err) {
    el.innerHTML = `<div class="text-center text-sm text-red-400 py-4">查詢失敗，請稍後再試</div>`;
  }
};

// ── 點訂單顯示詳細 ────────────────────────────────────
window.showOrderDetail = async (orderId, customer) => {
  const el = document.getElementById("result2");
  el.innerHTML = `<div class="text-center text-gray-400 py-8 text-sm">載入中...</div>`;

  try {
    const res  = await fetch(`${QUERY_API}&orderId=${encodeURIComponent(orderId)}`);
    const data = await res.json();
    if (!res.ok) return;
    el.innerHTML = `
      <button onclick="queryByCustomer()" class="flex items-center gap-1 text-sm text-gray-400 hover:text-black mb-4">
        ← 返回訂單列表
      </button>
      ${renderOrderDetail({ ...customer, ...data, customerPageId: customer.pageId })}`;
  } catch {}
};

// ── 查客戶資料 ────────────────────────────────────────
async function fetchCustomer(customerId) {
  if (!customerId) return {};
  try {
    const res  = await fetch(`https://shoptest-chi.vercel.app/api/customer?customerId=${encodeURIComponent(customerId)}`);
    const data = await res.json();
    return data.found ? data : {};
  } catch { return {}; }
}

// ── 訂單詳情 HTML ─────────────────────────────────────
function renderOrderDetail(data) {
  const status  = STATUS_MAP[data.status] || STATUS_MAP["待處理"];
  const current = STEPS.indexOf(data.status);
  const date    = new Date(data.createdAt);
  const dateStr = `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,"0")}:${String(date.getMinutes()).padStart(2,"0")}`;

  const stepsHtml = STEPS.map((step, i) => {
    const done    = i <= current;
    const isCurrent = i === current;
    return `
      <div class="flex flex-col items-center flex-1">
        <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold mb-1
          ${done ? "bg-black text-white" : "bg-gray-200 text-gray-400"}
          ${isCurrent ? "ring-2 ring-black ring-offset-2" : ""}">
          ${done && !isCurrent ? "✓" : i + 1}
        </div>
        <span class="text-xs ${isCurrent ? "font-bold text-black" : "text-gray-400"}">${step}</span>
      </div>
      ${i < STEPS.length - 1 ? `<div class="flex-1 h-0.5 mt-3.5 ${i < current ? "bg-black" : "bg-gray-200"}"></div>` : ""}`;
  }).join("");

  // 支援 JSON 陣列（新格式）和純文字（舊格式）
  let itemsHtml = "";
  if (Array.isArray(data.items) && data.items.length) {
    itemsHtml = data.items.map(i => `
      <div class="flex justify-between py-2 text-sm border-b last:border-0">
        <span class="text-gray-700">${i.name}${i.variant ? ` <span class="text-xs text-gray-400">（${i.variant}）</span>` : ""} × ${i.qty}</span>
        <span class="text-gray-500">${formatPrice(i.price * i.qty)}</span>
      </div>`).join("");
  } else {
    const text = typeof data.items === "string" ? data.items : "";
    itemsHtml = text.split("\n").filter(Boolean).map(line => `
      <div class="flex justify-between py-2 text-sm border-b last:border-0">
        <span class="text-gray-700">${line.split("（")[0].trim()}</span>
        <span class="text-gray-500">${line.match(/（(.+)）/)?.[1] || ""}</span>
      </div>`).join("");
  }

  return `
    <div class="bg-white rounded-xl border px-4 py-4 mb-3">
      <div class="flex justify-between items-start mb-3">
        <div>
          <div class="text-xs text-gray-400 mb-0.5">訂單編號</div>
          <div class="font-bold tracking-wider">${data.orderId}</div>
        </div>
        <span class="text-xs px-2.5 py-1 rounded-full font-medium ${status.color}">
          ${status.icon} ${data.status}
        </span>
      </div>
      <div class="text-xs text-gray-400">下單時間：${dateStr}</div>
    </div>

    <div class="bg-white rounded-xl border px-4 py-5 mb-3">
      <div class="text-xs font-semibold text-gray-500 mb-4">訂單進度</div>
      <div class="flex items-start">${stepsHtml}</div>
    </div>

    <div class="bg-white rounded-xl border px-4 py-4 mb-3">
      <div class="text-xs font-semibold text-gray-500 mb-2">訂單明細</div>
      ${itemsHtml}
      ${data.discount > 0 ? `
      <div class="flex justify-between items-center py-2 text-sm text-green-600">
        <span>🎉 滿NT$3,000折扣</span>
        <span>- NT$200</span>
      </div>` : ""}
      ${data.shipping > 0 ? `
      <div class="flex justify-between items-center py-2 text-sm text-gray-500">
        <span>出貨手續費</span>
        <span>NT$${data.shipping}</span>
      </div>` : data.shipping === 0 && data.total > 0 ? `
      <div class="flex justify-between items-center py-2 text-sm text-green-600">
        <span>出貨手續費</span>
        <span>免運</span>
      </div>` : ""}
      <div class="flex justify-between items-center pt-3 font-bold border-t">
        <span>合計</span>
        <span class="text-red-500">${formatPrice(data.total)}</span>
      </div>
    </div>

    <div class="bg-white rounded-xl border px-4 py-4">
      <div class="flex justify-between items-center mb-2">
        <div class="text-xs font-semibold text-gray-500">收件資料</div>
        ${data.customerId ? `<span class="text-xs text-blue-500 font-medium">${data.customerId}</span>` : ""}
      </div>
      <div class="text-sm text-gray-700 space-y-1">
        <div>${data.name || "—"}</div>
        ${data.phone ? `<div class="text-gray-500 text-xs">${data.phone}</div>` : ""}
        <div class="text-gray-400 text-xs">${data.address || "—"}</div>
      </div>
    </div>

    <!-- 操作按鈕（待處理或處理中才顯示）-->
    ${["待處理","處理中"].includes(data.status) ? `
    <div class="flex flex-col gap-2 mt-3">
      ${data.status === "待處理" && Array.isArray(data.items) ? `
      <button onclick="openItemsModal('${encodeData({pageId:data.pageId,status:data.status})}', ${JSON.stringify(data.items).replace(/"/g, '&quot;')})"
        class="w-full py-2.5 border rounded-xl text-sm text-gray-600 hover:bg-gray-50 transition">
        🛒 修改商品數量 / 刪除商品
      </button>` : ""}
      <div class="flex gap-2">
        <button onclick="openEditModal('${encodeData({customerId:data.customerId,name:data.name,phone:data.phone,address:data.address,status:data.status})}')"
          class="flex-1 py-2.5 border rounded-xl text-sm text-gray-600 hover:bg-gray-50 transition">
          ✏️ 修改收件資料
        </button>
        <button onclick="openCancelModal('${encodeData({pageId:data.pageId,orderId:data.orderId,status:data.status})}')"
          class="flex-1 py-2.5 border border-red-200 rounded-xl text-sm text-red-400 hover:bg-red-50 transition">
          ${data.status === "待處理" ? "❌ 取消訂單" : "📋 申請取消"}
        </button>
      </div>
    </div>` : ""}`;
}

function encodeData(obj) {
  return encodeURIComponent(JSON.stringify(obj));
}

function notFoundHTML(msg) {
  return `
    <div class="flex flex-col items-center py-10 text-gray-400">
      <div class="text-4xl mb-3">🔍</div>
      <div class="text-sm font-medium text-gray-500">${msg}</div>
    </div>`;
}

// URL 帶 ?orderId= 直接查詢
const urlOrderId = new URLSearchParams(location.search).get("orderId");
if (urlOrderId) {
  document.getElementById("orderInput").value = urlOrderId;
  queryByOrder();
}
</script>

<script>
function toggleSearch() {
  const box = document.getElementById("searchBox");
  const isHidden = box.classList.contains("hidden");
  box.classList.toggle("hidden", !isHidden);
  box.classList.toggle("flex", isHidden);
  if (isHidden) setTimeout(() => document.getElementById("navSearchInput").focus(), 50);
  else closeSearch();
}
function closeSearch() {
  const box = document.getElementById("searchBox");
  box.classList.add("hidden"); box.classList.remove("flex");
  document.getElementById("navSearchInput").value = "";
}
function onNavSearch(val) {}
document.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("navSearchInput");
  if (!input) return;
  let isComposing = false;
  input.addEventListener("compositionstart", () => { isComposing = true; });
  input.addEventListener("compositionend", () => {
    isComposing = false;
    if (input.value.trim()) window.location.href = "search.html?q=" + encodeURIComponent(input.value.trim());
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !isComposing && input.value.trim())
      window.location.href = "search.html?q=" + encodeURIComponent(input.value.trim());
  });
});
document.addEventListener("click", (e) => {
  const wrap = document.getElementById("searchWrap");
  if (wrap && !wrap.contains(e.target)) closeSearch();
});
</script>

<script>
const ORDERS_API_MOD   = "https://shoptest-chi.vercel.app/api/orders-manage";
const CUSTOMER_API_MOD = "https://shoptest-chi.vercel.app/api/customer";
let _editData = null, _cancelData = null, _itemsData = null;

// ── 修改商品 ─────────────────────────────────────────
window.openItemsModal = (encoded, itemsJson) => {
  _itemsData = JSON.parse(decodeURIComponent(encoded));
  const rawItems = typeof itemsJson === 'string' ? JSON.parse(itemsJson) : itemsJson;
  // 直接用訂單裡儲存的 price（下單當時計算好的，含優惠碼）
  _itemsData._editItems = JSON.parse(JSON.stringify(rawItems));
  document.getElementById("itemsSaveStatus").classList.add("hidden");
  document.getElementById("itemsModal").classList.remove("hidden");
  document.body.style.overflow = "hidden";
  renderItemsEditor();
};

function closeItemsModal() {
  document.getElementById("itemsModal").classList.add("hidden");
  document.body.style.overflow = "";
}

function renderItemsEditor() {
  const items = _itemsData._editItems;
  const FLAT = 200, FREE = 5000;
  const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
  const shipping  = subtotal >= FREE ? 0 : FLAT;
  const total     = subtotal + shipping;

  document.getElementById("itemsNewTotal").textContent =
    "NT$" + Math.round(total).toLocaleString() +
    (shipping === 0 ? "（免運）" : `（含運NT$${shipping}）`);

  document.getElementById("itemsEditor").innerHTML = items.map((item, idx) => `
    <div class="flex items-center gap-3 border rounded-xl p-3 ${item.qty === 0 ? "opacity-40" : ""}">
      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium">${item.name}${item.variant ? ` <span class="text-xs text-gray-400">（${item.variant}）</span>` : ""}</div>
        <div class="text-xs text-gray-400 mt-0.5">
          ${item.idnumber ? `<span class="text-gray-300">#${item.idnumber}</span> · ` : ""}NT$${Math.floor(item.price).toLocaleString()} / 件
        </div>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <div class="flex items-center border rounded-lg overflow-hidden">
          <button onclick="changeItemQty(${idx}, -1)"
            class="w-8 h-8 flex items-center justify-center text-lg hover:bg-gray-100 transition">−</button>
          <span class="w-8 text-center text-sm font-medium">${item.qty}</span>
          <button onclick="changeItemQty(${idx}, 1)"
            class="w-8 h-8 flex items-center justify-center text-lg hover:bg-gray-100 transition">＋</button>
        </div>
        <button onclick="removeItem2(${idx})"
          class="text-gray-300 hover:text-red-400 text-xl transition">✕</button>
      </div>
    </div>`).join("");
}

window.changeItemQty = (idx, delta) => {
  const item = _itemsData._editItems[idx];
  item.qty = Math.max(0, item.qty + delta);
  renderItemsEditor();
};

window.removeItem2 = (idx) => {
  _itemsData._editItems.splice(idx, 1);
  renderItemsEditor();
};

async function saveItems() {
  const items = _itemsData._editItems.filter(i => i.qty > 0);
  if (!items.length) { alert("至少保留一件商品"); return; }

  const FLAT = 200, FREE = 5000;
  const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
  const total    = subtotal + (subtotal >= FREE ? 0 : FLAT);

  const btn    = document.querySelector("#itemsModal button:last-child");
  const status = document.getElementById("itemsSaveStatus");
  btn.disabled = true; btn.textContent = "儲存中...";

  try {
    const res  = await fetch(ORDERS_API_MOD, {
      method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pageId: _itemsData.pageId, items, total }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    status.textContent = "✅ 已更新！";
    status.className   = "text-xs text-center text-green-600";
    status.classList.remove("hidden");
    setTimeout(() => { closeItemsModal(); refreshCurrentOrder(); }, 1000);
  } catch (err) {
    status.textContent = "❌ " + err.message;
    status.className   = "text-xs text-center text-red-500";
    status.classList.remove("hidden");
    btn.disabled = false; btn.textContent = "儲存變更";
  }
}

// ── 重新載入當前訂單 ─────────────────────────────────
async function refreshCurrentOrder() {
  const orderId = document.getElementById("orderInput")?.value.trim();
  if (orderId) {
    await window.queryByOrder();
  }
}

window.openEditModal = (encoded) => {
  _editData = JSON.parse(decodeURIComponent(encoded));
  document.getElementById("editName").value    = _editData.name    || "";
  document.getElementById("editPhone").value   = _editData.phone   || "";
  document.getElementById("editAddress").value = _editData.address || "";
  document.getElementById("editStatus").classList.add("hidden");
  document.getElementById("editModal").classList.remove("hidden");
  document.body.style.overflow = "hidden";
};
function closeEditModal() {
  document.getElementById("editModal").classList.add("hidden");
  document.body.style.overflow = "";
}
async function submitEditCustomer() {
  const name    = document.getElementById("editName").value.trim();
  const phone   = document.getElementById("editPhone").value.trim();
  const address = document.getElementById("editAddress").value.trim();
  const status  = document.getElementById("editStatus");
  if (!name || !phone || !address) {
    status.textContent = "請填寫所有欄位";
    status.className   = "text-xs text-center text-red-500";
    status.classList.remove("hidden"); return;
  }
  try {
    const res  = await fetch(CUSTOMER_API_MOD, {
      method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ customerId: _editData.customerId, name, phone, address }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    status.textContent = "✅ 已更新！";
    status.className   = "text-xs text-center text-green-600";
    status.classList.remove("hidden");
    setTimeout(() => { closeEditModal(); refreshCurrentOrder(); }, 1000);
  } catch (err) {
    status.textContent = "❌ " + err.message;
    status.className   = "text-xs text-center text-red-500";
    status.classList.remove("hidden");
  }
}

window.openCancelModal = (encoded) => {
  _cancelData = JSON.parse(decodeURIComponent(encoded));
  const isPending = _cancelData.status === "待處理";
  document.getElementById("cancelTitle").textContent = isPending ? "取消訂單" : "申請取消";
  document.getElementById("cancelDesc").textContent  = isPending
    ? `確定要取消訂單 ${_cancelData.orderId}？此操作無法復原。`
    : `訂單 ${_cancelData.orderId} 目前處理中，送出申請後將等待店家確認。`;
  document.getElementById("cancelStatus").classList.add("hidden");
  document.getElementById("cancelConfirmBtn").disabled = false;
  document.getElementById("cancelConfirmBtn").textContent = "確認";
  document.getElementById("cancelModal").classList.remove("hidden");
  document.body.style.overflow = "hidden";
};
function closeCancelModal() {
  document.getElementById("cancelModal").classList.add("hidden");
  document.body.style.overflow = "";
}
async function submitCancel() {
  const btn    = document.getElementById("cancelConfirmBtn");
  const status = document.getElementById("cancelStatus");
  btn.disabled = true; btn.textContent = "處理中...";
  try {
    const isPending = _cancelData.status === "待處理";
    const newStatus = isPending ? "已取消" : "申請取消中";
    const res  = await fetch(ORDERS_API_MOD, {
      method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pageId: _cancelData.pageId, status: newStatus }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    status.textContent = isPending ? "✅ 訂單已取消" : "✅ 申請已送出，請等待通知";
    status.className   = "text-xs text-center text-green-600";
    status.classList.remove("hidden");
    btn.textContent = "完成";
    setTimeout(() => {
      closeCancelModal();
      if (isPending) {
        location.href = "index.html";
      } else {
        refreshCurrentOrder();
      }
    }, 1500);
  } catch (err) {
    status.textContent = "❌ " + err.message;
    status.className   = "text-xs text-center text-red-500";
    status.classList.remove("hidden");
    btn.disabled = false; btn.textContent = "確認";
  }
}

// ── 編輯集運批次 ─────────────────────────────────────
let _editBundleId   = null;
let _editBundleData = null; // { bundleOrders, allOrders, customer }

window.openEditBundleById = async (bundleId) => {
  _editBundleId = bundleId;

  // 直接用剛查詢過的快取資料
  if (!window._lastCustomerData) return;
  _editBundleData = window._lastCustomerData;
  renderEditBundleModal(bundleId, window._lastCustomerData);
  document.getElementById("editBundleModal").classList.remove("hidden");
  document.body.style.overflow = "hidden";
};

function renderEditBundleModal(bundleId, data) {
  const modal = document.getElementById("editBundleModal");
  const shortId = bundleId.replace("BUNDLE", "");
  const bundleOrders  = data.orders.filter(o => o.bundleId === bundleId);
  const freeOrders    = data.orders.filter(o => !o.bundleId && o.status === "待處理");

  document.getElementById("editBundleTitle").textContent = `編輯集運批次 #${shortId}`;

  // 批次內的訂單
  document.getElementById("editBundleIn").innerHTML = bundleOrders.map(o => `
    <div class="flex items-center justify-between border rounded-xl px-3 py-2.5 bg-blue-50">
      <div class="min-w-0">
        <div class="text-sm font-medium">${o.orderId}</div>
        <div class="text-xs text-gray-400">NT$ ${Math.floor(o.total||0).toLocaleString()}</div>
      </div>
      <button onclick="removeFromBundle('${o.pageId}')"
        class="text-xs px-2 py-1 border border-red-200 text-red-400 rounded-lg hover:bg-red-50 ml-2 shrink-0">
        移除
      </button>
    </div>`).join("") || '<div class="text-xs text-gray-400 text-center py-2">批次已空</div>';

  // 可加入的訂單
  document.getElementById("editBundleOut").innerHTML = freeOrders.length ? freeOrders.map(o => `
    <div class="flex items-center justify-between border rounded-xl px-3 py-2.5">
      <div class="min-w-0">
        <div class="text-sm font-medium">${o.orderId}</div>
        <div class="text-xs text-gray-400">NT$ ${Math.floor(o.total||0).toLocaleString()}</div>
      </div>
      <button onclick="addToBundle('${o.pageId}')"
        class="text-xs px-2 py-1 border border-blue-200 text-blue-500 rounded-lg hover:bg-blue-50 ml-2 shrink-0">
        加入
      </button>
    </div>`).join("") : '<div class="text-xs text-gray-400 text-center py-2">沒有可加入的訂單</div>';
}

async function removeFromBundle(pageId) {
  try {
    await fetch(ORDERS_API_MOD, {
      method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pageId, bundleId: "" }),
    });
    closeEditBundleModal();
    window.queryByCustomer();
  } catch (err) { alert("操作失敗：" + err.message); }
}

async function addToBundle(pageId) {
  try {
    await fetch(ORDERS_API_MOD, {
      method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pageId, bundleId: _editBundleId }),
    });
    closeEditBundleModal();
    window.queryByCustomer();
  } catch (err) { alert("操作失敗：" + err.message); }
}

function closeEditBundleModal() {
  document.getElementById("editBundleModal").classList.add("hidden");
  document.body.style.overflow = "";
}

// ── 集運合併（訂單查詢頁）────────────────────────────
let _mergeSelected = new Set();

window.toggleMergeOrder = (checkbox) => {
  const pageId = checkbox.value;
  if (checkbox.checked) _mergeSelected.add(pageId);
  else _mergeSelected.delete(pageId);
  updateMergeArea();
};

function updateMergeArea() {
  const area = document.getElementById("mergeArea");
  const summary = document.getElementById("mergeSummary");
  if (!area || !summary) return;

  if (_mergeSelected.size < 2) {
    area.classList.add("hidden");
    return;
  }

  // 計算合計
  let total = 0;
  let hasDiscounted = false;
  document.querySelectorAll("input[type=checkbox][data-total]:checked").forEach(cb => {
    total += Number(cb.dataset.total) || 0;
    if (Number(cb.dataset.discount) > 0) hasDiscounted = true;
  });

  const DISCOUNT_MIN = 3000, DISCOUNT_AMT = 200, FREE_AMOUNT = 5000;
  const discount = (!hasDiscounted && total >= DISCOUNT_MIN) ? DISCOUNT_AMT : 0;
  const afterDiscount = total - discount;
  const shipping = afterDiscount >= FREE_AMOUNT ? 0 : 200;
  const grandTotal = afterDiscount + shipping;

  summary.innerHTML = `
    <div class="space-y-1 text-sm">
      <div class="flex justify-between"><span class="text-gray-500">選取 ${_mergeSelected.size} 筆訂單</span><span>NT$${Math.floor(total).toLocaleString()}</span></div>
      ${discount > 0 ? `<div class="flex justify-between text-green-600"><span>🎉 滿NT$3,000折扣</span><span>- NT$200</span></div>` : ""}
      <div class="flex justify-between ${shipping === 0 ? "text-green-600" : "text-gray-500"}"><span>出貨手續費</span><span>${shipping === 0 ? "免費" : "NT$" + shipping}</span></div>
      <div class="flex justify-between font-bold pt-1 border-t"><span>合計</span><span class="text-red-500">NT$${Math.floor(grandTotal).toLocaleString()}</span></div>
    </div>`;

  area.classList.remove("hidden");
}

async function confirmMerge() {
  if (_mergeSelected.size < 2) { alert("請至少選擇 2 筆訂單"); return; }

  const btn = document.querySelector("#mergeArea button");
  btn.disabled = true; btn.textContent = "處理中...";

  try {
    const bundleId = "BUNDLE" + Date.now().toString().slice(-8);
    const pageIds  = [..._mergeSelected];

    await Promise.all(pageIds.map(pageId =>
      fetch(ORDERS_API_MOD, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pageId, bundleId }),
      })
    ));

    btn.textContent = "✅ 集運合併成功！";
    setTimeout(() => {
      _mergeSelected.clear();
      window.queryByCustomer();
    }, 1200);
  } catch (err) {
    alert("集運失敗：" + err.message);
    btn.disabled = false; btn.textContent = "確認集運合併";
  }
}

</script>
