<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>W-82 大阪代購</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="js/theme.css">
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="logo">W-82</a>
  <div class="nav-right">
    <button class="nav-icon-btn" onclick="toggleSearch()" id="searchToggleBtn" aria-label="搜尋">
      <i class="ti ti-search"></i>
    </button>
    <a href="cart.html" class="nav-icon-btn" aria-label="購物車">
      <i class="ti ti-shopping-cart"></i>
      <span id="cartCount" class="cart-badge" style="display:none">0</span>
    </a>
  </div>
</nav>

<!-- 搜尋列 -->
<div id="searchBar" style="display:none;background:var(--white);padding:10px 16px;border-bottom:1px solid var(--gray-200)">
  <div style="display:flex;align-items:center;gap:8px;background:var(--gray-100);border-radius:var(--radius);padding:10px 14px">
    <i class="ti ti-search" style="color:var(--gray-400);font-size:20px"></i>
    <input id="navSearchInput" type="text" placeholder="搜尋商品名稱、商品編號…"
      style="border:none;background:transparent;flex:1;font-size:16px;outline:none;padding:0"
      oninput="onNavSearch(this.value)"
      onkeydown="if(event.key==='Enter'&&this.value.trim())location.href='search.html?q='+encodeURIComponent(this.value.trim());if(event.key==='Escape')closeSearch()">
    <button onclick="closeSearch()" style="background:none;border:none;cursor:pointer;padding:0;color:var(--gray-400);font-size:20px">
      <i class="ti ti-x"></i>
    </button>
  </div>
  <div id="searchDropdown" style="display:none;margin-top:8px;max-height:280px;overflow-y:auto"></div>
</div>

<div class="page-wrap">
  <!-- Banner -->
  <div id="bannerWrap"></div>

  <!-- 大分類 -->
  <div class="cat-bar" id="mainTabs"></div>

  <!-- 小分類 -->
  <div id="subTabsWrap" style="display:none">
    <div class="cat-bar" id="subTabs" style="background:var(--gray-50)"></div>
  </div>

  <!-- 商品列表 -->
  <div id="listWrap"></div>
</div>

<!-- 底部導覽 -->
<nav class="bottom-nav">
  <a href="index.html" class="bnav-item active"><i class="ti ti-home"></i>首頁</a>
  <a href="hot.html"   class="bnav-item"><i class="ti ti-flame"></i>熱賣</a>
  <button class="bnav-item" onclick="toggleSearch()"><i class="ti ti-search"></i>搜尋</button>
  <a href="order-status.html" class="bnav-item"><i class="ti ti-clipboard-list"></i>訂單</a>
  <a href="about.html" class="bnav-item"><i class="ti ti-info-circle"></i>關於</a>
</nav>

<script type="module" src="js/cartCount.js"></script>
<script type="module">
import { initBanner } from "./js/banner.js";
initBanner("bannerWrap");
</script>
<script type="module" src="js/main.js"></script>
<script>
function toggleSearch() {
  const bar = document.getElementById("searchBar");
  const isHidden = bar.style.display === "none";
  bar.style.display = isHidden ? "block" : "none";
  if (isHidden) document.getElementById("navSearchInput").focus();
}
function closeSearch() {
  document.getElementById("searchBar").style.display = "none";
  document.getElementById("navSearchInput").value = "";
  document.getElementById("searchDropdown").style.display = "none";
}
function onNavSearch(val) {
  if (!val.trim()) { document.getElementById("searchDropdown").style.display = "none"; return; }
  if (val.trim().length >= 1 && event.key === "Enter") {
    location.href = "search.html?q=" + encodeURIComponent(val.trim());
  }
}
</script>
</body>
</html>
