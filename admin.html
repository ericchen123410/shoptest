<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台管理 | W-82</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="js/admin-theme.css">
<style>
@media (max-width: 768px) {
  .admin-sidebar { display: none !important; }
  .admin-main { margin-left: 0 !important; width: 100% !important; }
  .admin-content { padding: 12px !important; padding-bottom: 72px !important; }
  .admin-topbar { padding: 12px 16px !important; }
  .admin-bottom-nav { display: grid !important; }
  .form-grid { grid-template-columns: 1fr !important; }
  .filter-bar { flex-wrap: nowrap !important; overflow-x: auto !important; }
}
@media (min-width: 769px) {
  .admin-bottom-nav { display: none !important; }
}
</style>
</head>
<body>

<!-- 登入頁 -->
<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">W-82</div>
    <div class="login-sub">後台管理系統</div>
    <div class="form-row">
      <input id="passwordInput" type="password" placeholder="請輸入管理員密碼"
        onkeydown="if(event.key==='Enter') login()">
    </div>
    <button onclick="login()" class="btn btn-primary w-full" style="justify-content:center;padding:12px">登入</button>
    <div id="loginError" style="display:none;margin-top:10px;text-align:center;font-size:13px;color:var(--red)"></div>
  </div>
</div>

<!-- 後台主畫面 -->
<div id="adminScreen" style="display:none" class="admin-layout">
  <aside class="admin-sidebar">
    <a href="admin.html" class="sidebar-logo">W-82</a>
    <nav class="sidebar-nav">
      <a href="admin-orders.html"   class="sidebar-item"><i class="ti ti-clipboard-list"></i>訂單管理</a>
      <a href="admin-products.html" class="sidebar-item"><i class="ti ti-package"></i>商品管理</a>
      <a href="admin-add.html"      class="sidebar-item"><i class="ti ti-plus"></i>新增商品</a>
      <a href="admin-customers.html" class="sidebar-item"><i class="ti ti-users"></i>客戶管理</a>
      <a href="admin-banners.html"  class="sidebar-item"><i class="ti ti-photo"></i>輪播管理</a>
      <a href="admin-batch-add.html"      class="sidebar-item"><i class="ti ti-list-check"></i>批次上架</a>
      <a href="admin-batch-generate.html" class="sidebar-item"><i class="ti ti-sparkles"></i>AI 批次生成</a>
    </nav>
    <div class="sidebar-footer">
      <a href="index.html" target="_blank" class="sidebar-item"><i class="ti ti-external-link"></i>前往商店</a>
    </div>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <span class="topbar-title">主控台</span>
    </div>
    <div class="admin-content">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px">
        <a href="admin-orders.html" class="card" style="text-decoration:none;color:inherit;display:block">
          <div style="font-size:13px;color:var(--gray-400);margin-bottom:6px">訂單管理</div>
          <div style="font-size:24px;font-weight:700">📦</div>
        </a>
        <a href="admin-products.html" class="card" style="text-decoration:none;color:inherit;display:block">
          <div style="font-size:13px;color:var(--gray-400);margin-bottom:6px">商品管理</div>
          <div style="font-size:24px;font-weight:700">🛍</div>
        </a>
        <a href="admin-add.html" class="card" style="text-decoration:none;color:inherit;display:block">
          <div style="font-size:13px;color:var(--gray-400);margin-bottom:6px">新增商品</div>
          <div style="font-size:24px;font-weight:700">➕</div>
        </a>
        <a href="admin-customers.html" class="card" style="text-decoration:none;color:inherit;display:block">
          <div style="font-size:13px;color:var(--gray-400);margin-bottom:6px">客戶管理</div>
          <div style="font-size:24px;font-weight:700">👥</div>
        </a>
        <a href="admin-banners.html" class="card" style="text-decoration:none;color:inherit;display:block">
          <div style="font-size:13px;color:var(--gray-400);margin-bottom:6px">輪播管理</div>
          <div style="font-size:24px;font-weight:700">🖼</div>
        </a>
      </div>
    </div>
  </main>
</div>

<script>
const ADMIN_API = "https://shoptest-chi.vercel.app/api/admin-login";
async function login() {
  const pw  = document.getElementById("passwordInput").value;
  const err = document.getElementById("loginError");
  if (!pw) { err.textContent = "請輸入密碼"; err.style.display = "block"; return; }
  try {
    const res  = await fetch(ADMIN_API, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({password:pw}) });
    const data = await res.json();
    if (data.success) {
      sessionStorage.setItem("adminAuth","1");
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("adminScreen").style.display = "flex";
    } else {
      err.textContent = "密碼錯誤";
      err.style.display = "block";
    }
  } catch { err.textContent = "連線失敗"; err.style.display = "block"; }
}
if (sessionStorage.getItem("adminAuth") === "1") {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("adminScreen").style.display = "flex";
}
document.getElementById("passwordInput").addEventListener("keydown", e => { if(e.key==="Enter") login(); });
</script>

<nav class="admin-bottom-nav" style="display:none">
  <a href="admin-orders.html" class="admin-bnav-item"><i class="ti ti-clipboard-list"></i>訂單</a>
  <a href="admin-products.html" class="admin-bnav-item"><i class="ti ti-package"></i>商品</a>
  <a href="admin-add.html" class="admin-bnav-item"><i class="ti ti-plus"></i>新增</a>
  <a href="admin-customers.html" class="admin-bnav-item"><i class="ti ti-users"></i>客戶</a>
  <a href="admin-banners.html" class="admin-bnav-item"><i class="ti ti-photo"></i>輪播</a>
</nav>
</body>
</html>
