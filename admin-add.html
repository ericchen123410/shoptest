<style>

input:focus,textarea:focus,select:focus{border-color:var(--black)!important;outline:none!important}
button{cursor:pointer}
.bg-yellow-100{background:#fef9c3!important}
.text-yellow-700{color:#a16207!important}
.bg-blue-100{background:#dbeafe!important}
.text-blue-600{color:#1d4ed8!important}
.bg-purple-100{background:#ede9fe!important}
.text-purple-600{color:#6d28d9!important}
.bg-green-100{background:#dcfce7!important}
.text-green-600{color:#15803d!important}
.bg-orange-100{background:#ffedd5!important}
.text-orange-500{color:#c2410c!important}
</style>

<style id="tw-override-extra">
/* 主容器 */
.px-4.py-4.max-w-4xl.mx-auto,.px-4.py-5.max-w-2xl.mx-auto,.px-4.py-5.max-w-3xl.mx-auto,.px-4.py-5.max-w-5xl.mx-auto{padding:0!important;max-width:none!important}

/* flex layouts */
.flex.items-center.justify-between{display:flex;align-items:center;justify-content:space-between}
.flex.items-center.gap-2{display:flex;align-items:center;gap:8px}
.flex.gap-2{display:flex;gap:8px}
.flex.gap-2.mb-4{display:flex;gap:8px;margin-bottom:16px}
.flex.flex-wrap.gap-1\.5{display:flex;flex-wrap:wrap;gap:6px}
.flex.flex-col.items-center{display:flex;flex-direction:column;align-items:center}

/* 輸入框 */
.flex-1.border.rounded-xl,.w-full.border.rounded-xl{border:1px solid var(--gray-200)!important;border-radius:var(--radius)!important;font-size:14px!important}
.focus\:outline-none{outline:none!important}
.focus\:ring-2{box-shadow:none!important}
.pr-10{padding-right:10px!important}

/* 卡片 */

.shadow-sm{box-shadow:none!important;border:1px solid var(--gray-200)!important}

/* Modal overlay */
.hidden.fixed.inset-0.z-50,.hidden.fixed.inset-0{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.5);align-items:flex-end;justify-content:center}
.bg-black.bg-opacity-40{background:rgba(0,0,0,0.5)!important}
.bg-white.w-full.sm\:max-w-lg,.bg-white.w-full.sm\:max-w-md{background:var(--white)!important;width:100%!important;max-width:520px!important;border-radius:16px 16px 0 0!important;max-height:88vh!important;overflow-y:auto!important}
.sm\:rounded-2xl.rounded-t-2xl{border-radius:16px 16px 0 0!important}

/* overflow */
.overflow-x-auto{overflow-x:auto}

.-mx-4.px-4{margin-left:0!important;padding-left:0!important}

/* 狀態文字 */
.text-sm.text-gray-600{font-size:14px;color:var(--gray-600)}
.text-xs.text-gray-500{font-size:12px;color:var(--gray-400)}
.font-semibold.text-sm{font-size:14px;font-weight:600}
.font-bold.text-base{font-size:16px;font-weight:700}

/* 按鈕 */
.px-3.py-1\.5.border.rounded-xl,.px-4.py-1\.5.border.rounded-xl{padding:6px 12px!important;border:1px solid var(--gray-200)!important;border-radius:var(--radius)!important;font-size:13px!important;background:var(--white)!important;color:var(--black)!important}
.px-4.py-1\.5.bg-black.text-white{padding:6px 14px!important;background:var(--black)!important;color:var(--white)!important;border:none!important;border-radius:var(--radius)!important;font-size:13px!important}
.px-4.py-2\.5.bg-purple-600,.px-4.py-2\.5.bg-black{padding:9px 16px!important;background:var(--black)!important;color:var(--white)!important;border:none!important;border-radius:var(--radius)!important;font-size:14px!important}
.hover\:bg-gray-800:hover,.hover\:bg-gray-50:hover,.hover\:bg-purple-700:hover{opacity:0.85!important}
.text-gray-400.hover\:text-black{background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:22px}

/* 集運/狀態區 */
.hidden.sticky.bottom-0.bg-white{display:none;position:sticky;bottom:0;background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--gray-200);padding:16px;margin-top:12px}

/* 上傳區 */
.border-2.border-dashed.border-gray-200.rounded-xl{border:2px dashed var(--gray-200)!important;border-radius:var(--radius-lg)!important}
.border-2.border-dashed:hover{border-color:#999!important}
.relative.overflow-hidden.rounded-xl{border-radius:var(--radius-lg)!important}

/* AI 生成區 */
.font-semibold.text-sm.text-purple-800{font-size:14px;font-weight:600;color:var(--black)}
.hidden.bg-white.rounded-xl.border.border-purple-100{display:none;background:var(--gray-50)!important;border:1px solid var(--gray-200)!important;border-radius:var(--radius)!important;padding:12px!important;font-size:14px!important}
.hidden.bg-white.rounded-2xl{display:none;background:var(--white)!important;border-radius:var(--radius-lg)!important}
.px-4.py-2\.5.bg-purple-600.text-white{padding:9px 16px!important;background:var(--black)!important;color:var(--white)!important;border:none!important;border-radius:var(--radius)!important;font-size:14px!important}
</style>

<body>

<script>
if (sessionStorage.getItem("adminAuth") !== "1") location.href = "admin.html";
</script>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <a href="admin.html" class="sidebar-logo">W-82</a>
    <nav class="sidebar-nav">
      <a href="admin-orders.html"         class="sidebar-item"><i class="ti ti-clipboard-list"></i>訂單管理</a>
      <a href="admin-products.html"       class="sidebar-item"><i class="ti ti-package"></i>商品管理</a>
      <a href="admin-add.html"            class="sidebar-item active"><i class="ti ti-plus"></i>新增商品</a>
      <a href="admin-customers.html"      class="sidebar-item"><i class="ti ti-users"></i>客戶管理</a>
      <a href="admin-banners.html"        class="sidebar-item"><i class="ti ti-photo"></i>輪播管理</a>
      <a href="admin-batch-add.html"      class="sidebar-item"><i class="ti ti-list-check"></i>批次上架</a>
      <a href="admin-batch-generate.html" class="sidebar-item"><i class="ti ti-sparkles"></i>AI批次生成</a>
    </nav>
    <div class="sidebar-footer">
      <a href="index.html" target="_blank" class="sidebar-item"><i class="ti ti-external-link"></i>前往商店</a>
      <button onclick="sessionStorage.removeItem('adminAuth');location.href='admin.html'" class="sidebar-item"><i class="ti ti-logout"></i>登出</button>
    </div>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar"><span class="topbar-title">新增商品</span></div>
    <div class="admin-content">


<div style="padding:0">

  <!-- 🤖 AI 描述生成工具 -->
  <div class="bg-gradient-to-r from-purple-50 to-blue-50 rounded-2xl p-4 shadow-sm border border-purple-100">
    <div class="flex items-center gap-2 mb-3">
      <span class="text-lg">🤖</span>
      <h2 class="font-semibold text-sm text-purple-800">AI 商品描述生成</h2>
    </div>

    <div class="space-y-2">
      <div>
        <label class="text-xs text-gray-500 mb-1 block">輸入日文商品名稱或商品編號</label>
        <div class="flex gap-2">
          <input id="aiProductName" type="text"
            placeholder="例：カークランド アーモンドミルク"
            class="flex-1 border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400 bg-white"
            onkeydown="if(event.key==='Enter') generateDescription()">
          <button id="aiGenerateBtn" onclick="generateDescription()"
            class="px-4 py-2.5 bg-purple-600 text-white text-sm font-medium rounded-xl hover:bg-purple-700 active:bg-purple-800 transition shrink-0">
            ✨ 一鍵生成
          </button>
        </div>
      </div>
      <p id="aiStatus" class="text-xs text-gray-400 hidden"></p>

      <!-- 生成結果預覽 -->
      <div id="aiPreview" class="hidden bg-white rounded-xl border border-purple-100 p-3 text-xs text-gray-600 leading-relaxed whitespace-pre-wrap max-h-48 overflow-y-auto"></div>
    </div>
  </div>

  <!-- ① 照片上傳 -->
  <div class="bg-white rounded-2xl p-4 shadow-sm">
    <div class="flex items-center gap-2 mb-4">
      <span style="width:28px;height:28px;background:#111;color:#fff;border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">1</span>
      <h2 class="font-semibold text-sm">上傳照片</h2>
    </div>
    <div class="space-y-3">
      <div>
        <div class="text-xs text-gray-500 mb-1.5">首頁主圖 <span class="text-red-400">（封面用，建議正方形）</span></div>
        <div id="mainImgBox"
          style="position:relative;display:flex;align-items:center;justify-content:center;border:2px dashed #e5e5e5;border-radius:8px;height:160px;cursor:pointer;overflow:hidden;background:#f9f9f9"
          onclick="document.getElementById('mainImgInput').click()">
          <div id="mainImgPlaceholder" class="flex flex-col items-center text-gray-400">
            <span class="text-3xl mb-1">🖼</span>
            <span class="text-xs">點擊上傳主圖</span>
          </div>
          <img id="mainImgPreview" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover">
          <div id="mainImgLoading" style="display:none;position:absolute;inset:0;background:#f9f9f9;align-items:center;justify-content:center;font-size:14px;color:#aaa">⏳ 上傳中...</div>
          <button id="mainImgRemove" onclick="removeMainImg(event)" style="display:none;position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;z-index:10;align-items:center;justify-content:center">✕</button>
        </div>
        <input id="mainImgInput" type="file" accept="image/*" class="hidden">
      </div>
      <div>
        <div class="text-xs text-gray-500 mb-1.5">商品詳細圖 <span class="text-gray-400">（依序顯示於商品頁）</span></div>
        <div id="detailSlots" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px"></div>
        <button type="button" onclick="addDetailSlot()"
          class="w-full py-2 border border-dashed border-gray-300 rounded-xl text-xs text-gray-400 hover:border-gray-500 hover:text-gray-600 transition">
          ＋ 新增一張詳細圖
        </button>
      </div>
    </div>
  </div>

  <!-- ② 基本資料 -->
  <div class="bg-white rounded-2xl p-4 shadow-sm">
    <div class="flex items-center gap-2 mb-3">
      <span style="width:28px;height:28px;background:#111;color:#fff;border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">2</span>
      <h2 class="font-semibold text-sm">基本資料</h2>
    </div>
    <div class="space-y-3">
      <div>
        <label class="text-xs text-gray-500 mb-1 block">商品名稱 <span class="text-red-500">*</span></label>
        <input id="tname" type="text" placeholder="請輸入商品名稱"
          class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
      </div>
      <div>
        <label class="text-xs text-gray-500 mb-1 block">日文名稱</label>
        <input id="jname" type="text" placeholder="日文商品名稱（選填）"
          class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
      </div>
      <div>
        <label class="text-xs text-gray-500 mb-1 block">商品編號 <span class="text-gray-400">（選填）</span></label>
        <div class="relative">
          <input id="idnumber" type="text" placeholder="請輸入商品編號"
            class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black pr-24">
          <div id="idnumberStatus" class="absolute right-3 top-2.5 text-xs"></div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-500 mb-1 block">原價 <span class="text-red-500">*</span></label>
          <input id="tprice" type="number" placeholder="0"
            class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
        </div>
        <div>
          <label class="text-xs text-gray-500 mb-1 block">特價（選填）</label>
          <input id="sprice" type="number" placeholder="0"
            class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
        </div>
      </div>
      <div>
        <label class="text-xs text-gray-500 mb-1 block">重量（kg）</label>
        <input id="weight" type="number" step="0.01" placeholder="例：0.5"
          class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
      </div>
      <div>
        <label class="text-xs text-gray-500 mb-2 block">大分類</label>
        <div id="mainCategoryBtns" class="flex flex-wrap gap-2 mb-2 min-h-[28px]">
          <span class="text-xs text-gray-300 self-center">載入中...</span>
        </div>
        <input id="mainCategory" type="text" placeholder="或直接輸入新分類"
          class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
      </div>
      <div id="subCatSection" class="hidden">
        <label class="text-xs text-gray-500 mb-2 block">小分類</label>
        <div id="categoryBtns" class="flex flex-wrap gap-2 mb-2 min-h-[28px]"></div>
        <input id="category" type="text" placeholder="或直接輸入新分類"
          class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
      </div>
    </div>
  </div>

  <!-- ③ 商品描述 -->
  <div class="bg-white rounded-2xl p-4 shadow-sm">
    <div class="flex items-center gap-2 mb-3">
      <span style="width:28px;height:28px;background:#111;color:#fff;border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">3</span>
      <h2 class="font-semibold text-sm">商品描述</h2>
    </div>
    <textarea id="description" rows="6"
      placeholder="商品內容跟特點&#10;• 特點一&#10;• 特點二&#10;重量：1kg&#10;產地：日本"
      class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black resize-none leading-relaxed"></textarea>
    <p class="text-xs text-gray-400 mt-1.5">• 開頭 → 清單　｜　key：value → 規格表　｜　其餘 → 段落</p>
  </div>

  <!-- ④ 標籤設定 -->
  <div class="bg-white rounded-2xl p-4 shadow-sm">
    <div class="flex items-center gap-2 mb-3">
      <span style="width:28px;height:28px;background:#111;color:#fff;border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">4</span>
      <h2 class="font-semibold text-sm">標籤設定</h2>
    </div>
    <div class="grid grid-cols-2 gap-2">
      <label class="flex items-center gap-3 border rounded-xl px-3 py-3 cursor-pointer hover:bg-gray-50">
        <input id="isView" type="checkbox" checked class="w-4 h-4 accent-black">
        <div><div class="text-sm font-medium">上架</div><div class="text-xs text-gray-400">isView</div></div>
      </label>
      <label class="flex items-center gap-3 border rounded-xl px-3 py-3 cursor-pointer hover:bg-gray-50">
        <input id="isNew" type="checkbox" class="w-4 h-4 accent-black">
        <div><div class="text-sm font-medium">🆕 新品</div><div class="text-xs text-gray-400">isNew</div></div>
      </label>
      <label class="flex items-center gap-3 border rounded-xl px-3 py-3 cursor-pointer hover:bg-gray-50">
        <input id="isHot" type="checkbox" class="w-4 h-4 accent-black">
        <div><div class="text-sm font-medium">🔥 熱賣</div><div class="text-xs text-gray-400">isHot</div></div>
      </label>
      <label class="flex items-center gap-3 border rounded-xl px-3 py-3 cursor-pointer hover:bg-gray-50">
        <input id="isSale" type="checkbox" class="w-4 h-4 accent-black">
        <div><div class="text-sm font-medium">🈹 特價</div><div class="text-xs text-gray-400">isSale</div></div>
      </label>
    </div>
    <div style="margin-top:12px">
      <label style="font-size:13px;font-weight:600;margin-bottom:6px;display:block">特價結束日期 <span style="font-size:12px;color:#aaa">（填入後到期自動關閉）</span></label>
      <input id="saleEnd" type="date" style="width:100%;border:1px solid #e5e5e5;border-radius:8px;padding:10px 12px;font-size:15px">
    </div>
  </div>

  <button id="submitBtn" onclick="submitProduct()"
    style="width:100%;padding:20px;background:#111;color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;margin-bottom:8px">
    ＋ 新增商品
  </button>
  <div class="pb-8"></div>
</div>

<!-- 成功畫面 -->
<div id="successScreen" style="display:none;position:fixed;inset:0;z-index:9999;background:#fff;flex-direction:column;align-items:center;justify-content:center;padding:32px">
  <div style="font-size:64px;margin-bottom:16px">🎉</div>
  <div style="font-size:24px;font-weight:700;margin-bottom:8px">商品已新增！</div>
  <div style="font-size:15px;color:#aaa;margin-bottom:32px">已成功寫入 Notion</div>
  <button onclick="resetForm()"
    style="width:100%;max-width:320px;padding:18px;background:#111;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer">
    繼續新增商品
  </button>
</div>

<script>
const CLOUD_NAME    = "doue38blc";
const UPLOAD_PRESET = "shop_upload";
const ADD_API       = "https://shoptest-chi.vercel.app/api/add-product";
const PRODUCTS_API  = "https://shoptest-chi.vercel.app/api/products";
const CHECK_ID_API  = "https://shoptest-chi.vercel.app/api/check-idnumber";

let mainImgUrl = "", detailUrls = [], allProductData = [];

const BTN_NORMAL = "";
const BTN_ACTIVE = "";
const BTN_NORMAL_STYLE = "padding:9px 14px;border-radius:8px;font-size:13px;font-weight:500;text-align:center;border:1.5px solid #e5e5e5;background:#fff;color:#111;cursor:pointer;white-space:nowrap;flex-shrink:0";
const BTN_ACTIVE_STYLE = "padding:9px 14px;border-radius:8px;font-size:13px;font-weight:500;text-align:center;border:1.5px solid #111;background:#111;color:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0";

(async () => {
  try {
    const res = await fetch(PRODUCTS_API, { cache: "no-store" });
    allProductData = await res.json();
    renderMainBtns();
    renderSubBtns("");
  } catch { document.getElementById("mainCategoryBtns").innerHTML = '<span class="text-xs text-gray-300">載入失敗</span>'; }
  addDetailSlot();

  document.getElementById("mainImgInput").addEventListener("change", async (e) => {
    const file = e.target.files[0]; if (file) { e.target.value = ""; await uploadMainImg(file); }
  });
  document.getElementById("mainCategory").addEventListener("input", (e) => renderSubBtns(e.target.value.trim()));

  let idCheckTimer = null;
  document.getElementById("idnumber").addEventListener("input", (e) => {
    const val = e.target.value.trim(), statusEl = document.getElementById("idnumberStatus");
    clearTimeout(idCheckTimer);
    if (!val) { statusEl.textContent = ""; return; }
    statusEl.textContent = "⏳";
    statusEl.className = "absolute right-3 top-2.5 text-xs text-gray-400";
    idCheckTimer = setTimeout(async () => {
      try {
        const res = await fetch(`${CHECK_ID_API}?idnumber=${encodeURIComponent(val)}`);
        const data = await res.json();
        if (data.exists) {
          statusEl.textContent = "⚠️ 已存在";
          statusEl.className = "absolute right-3 top-2.5 text-xs text-orange-500 font-medium";
          e.target.classList.add("border-orange-400"); e.target.classList.remove("border-green-400");
        } else {
          statusEl.textContent = "✅ 可使用";
          statusEl.className = "absolute right-3 top-2.5 text-xs text-green-500 font-medium";
          e.target.classList.add("border-green-400"); e.target.classList.remove("border-orange-400");
        }
      } catch { statusEl.textContent = ""; }
    }, 600);
  });
})();

function renderMainBtns() {
  const mains = [...new Set(allProductData.map(p => p.mainCategory).filter(Boolean))].sort();
  const el = document.getElementById("mainCategoryBtns");
  el.innerHTML = "";
  if (!mains.length) { el.innerHTML = '<span class="text-xs text-gray-300">尚無大分類</span>'; return; }
  mains.forEach(m => {
    const btn = document.createElement("button"); btn.type = "button"; btn.textContent = m; btn.style.cssText = BTN_NORMAL_STYLE;
    btn.onclick = () => { document.getElementById("mainCategory").value = m; document.getElementById("mainCategoryBtns").querySelectorAll("button").forEach(b => b.className = BTN_NORMAL); btn.style.cssText = BTN_ACTIVE_STYLE; document.getElementById("category").value = ""; renderSubBtns(m); };
    el.appendChild(btn);
  });
}

function renderSubBtns(selectedMain) {
  const section = document.getElementById("subCatSection");
  if (!selectedMain) { section.style.display="none"; return; }
  const subs = [...new Set(allProductData.filter(p => p.mainCategory === selectedMain).map(p => p.category).filter(Boolean))].sort();
  const el = document.getElementById("categoryBtns"); el.innerHTML = "";
  if (!subs.length) { section.style.display="none"; return; }
  section.style.display="flex";
  subs.forEach(s => {
    const btn = document.createElement("button"); btn.type = "button"; btn.textContent = s; btn.style.cssText = BTN_NORMAL_STYLE;
    btn.onclick = () => { document.getElementById("category").value = s; el.querySelectorAll("button").forEach(b => b.className = BTN_NORMAL); btn.style.cssText = BTN_ACTIVE_STYLE; };
    el.appendChild(btn);
  });
}

async function uploadMainImg(file) {
  document.getElementById("mainImgPlaceholder").style.display="none";
  document.getElementById("mainImgLoading").style.display="flex";
  try {
    mainImgUrl = await uploadToCloudinary(file);
    document.getElementById("mainImgPreview").src = mainImgUrl;
    document.getElementById("mainImgPreview").style.display="flex";
    document.getElementById("mainImgRemove").style.display="flex";
  } catch { alert("主圖上傳失敗"); document.getElementById("mainImgPlaceholder").style.display="flex"; }
  finally { document.getElementById("mainImgLoading").style.display="none"; }
}

function removeMainImg(e) {
  e.stopPropagation(); mainImgUrl = "";
  document.getElementById("mainImgPreview").style.display="none";
  document.getElementById("mainImgRemove").style.display="none";
  document.getElementById("mainImgPlaceholder").style.display="flex";
}

function addDetailSlot() {
  const idx = detailUrls.length; detailUrls.push("");
  const container = document.getElementById("detailSlots");
  const slot = document.createElement("div");
  slot.id = `slot-${idx}`;
  slot.style.cssText = "position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;background:#f9f9f9;border:2px dashed #e5e5e5;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0";
  slot.innerHTML = `
    <div class="slot-ph" style="display:flex;flex-direction:column;align-items:center;color:#aaa;pointer-events:none">
      <span style="font-size:20px">📷</span>
      <span style="font-size:11px;margin-top:2px">圖${idx+1}</span>
    </div>
    <img class="slot-img" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover">
    <div class="slot-load" style="display:none;position:absolute;inset:0;background:#f9f9f9;align-items:center;justify-content:center;font-size:12px;color:#aaa">⏳</div>
    <button class="slot-del" style="display:none;position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;z-index:10;align-items:center;justify-content:center">✕</button>
  `;
  slot.querySelector(".slot-del").onclick = (e) => { e.stopPropagation(); clearSlot(idx, slot); };
  slot.onclick = () => pickFile(idx, slot);
  container.appendChild(slot);
}

function pickFile(idx, slot) {
  const input = document.createElement("input"); input.type = "file"; input.accept = "image/*";
  input.onchange = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    slot.querySelector(".slot-ph").style.display="none"; slot.querySelector(".slot-load").style.display="flex";
    try {
      const url = await uploadToCloudinary(file); detailUrls[idx] = url;
      slot.querySelector(".slot-img").src = url; slot.querySelector(".slot-img").style.display="block"; const delB=slot.querySelector(".slot-del"); delB.style.display="flex"; delB.style.alignItems="center"; delB.style.justifyContent="center"; slot.onclick = null; slot.style.cursor="default";
    } catch { alert(`圖${idx+1}上傳失敗`); slot.querySelector(".slot-ph").style.display="flex"; }
    finally { slot.querySelector(".slot-load").style.display="none"; }
  }; input.click();
}

function clearSlot(idx, slot) {
  detailUrls[idx] = "";
  const imgEl = slot.querySelector(".slot-img");
  imgEl.src = ""; imgEl.style.display="none"; imgEl.style.display = "none";
  slot.querySelector(".slot-del").style.display="none";
  slot.querySelector(".slot-ph").style.display="flex";
  slot.classList.add("cursor-pointer","hover:border-gray-400");
  slot.onclick = () => pickFile(idx, slot);
}

async function uploadToCloudinary(file) {
  const fd = new FormData(); fd.append("file", file); fd.append("upload_preset", UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: fd });
  const data = await res.json(); if (!data.secure_url) throw new Error("上傳失敗"); return data.secure_url;
}

async function submitProduct() {
  const tname = document.getElementById("tname").value.trim(), tprice = document.getElementById("tprice").value.trim();
  if (!tname) { alert("請填寫商品名稱"); return; } if (!tprice) { alert("請填寫原價"); return; }

  // 送出前確認商品編號沒有重複
  const idnumberVal = document.getElementById("idnumber").value.trim();
  if (idnumberVal) {
    try {
      const checkRes = await fetch(`${CHECK_ID_API}?idnumber=${encodeURIComponent(idnumberVal)}`);
      const checkData = await checkRes.json();
      if (checkData.exists) {
        alert(`商品編號「${idnumberVal}」已存在，請更換編號！`);
        return;
      }
    } catch {}
  }

  const btn = document.getElementById("submitBtn"); btn.disabled = true; btn.textContent = "送出中...";
  try {
    const validDetails = detailUrls.filter(Boolean);
    const allImages = mainImgUrl ? [mainImgUrl, ...validDetails.filter(u => u !== mainImgUrl)] : validDetails;
    const jname = document.getElementById("jname").value.trim();
    const payload = { tname, jname, jprice: Number(tprice), jsprice: Number(document.getElementById("sprice").value)||0, mainCategory: document.getElementById("mainCategory").value.trim(), category: document.getElementById("category").value.trim(), description: document.getElementById("description").value.trim(), weight: Number(document.getElementById("weight").value)||0, idnumber: document.getElementById("idnumber").value.trim()||null, image: mainImgUrl, images: allImages.join(","), isView: document.getElementById("isView").checked, isNew: document.getElementById("isNew").checked, isHot: document.getElementById("isHot").checked, isSale: document.getElementById("isSale").checked, saleEnd: document.getElementById("saleEnd").value || null };
    const res = await fetch(ADD_API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
    const data = await res.json(); if (!data.success) throw new Error(data.error||"新增失敗");
    document.getElementById("successScreen").style.display="flex";
  } catch (err) { alert("新增失敗：" + err.message); btn.disabled = false; btn.textContent = "＋ 新增商品"; }
}

// ── AI 一鍵生成 ──────────────────────────────────────
const GENERATE_API = "https://shoptest-chi.vercel.app/api/generate-description";

async function generateDescription() {
  const name   = document.getElementById("aiProductName").value.trim();
  const btn    = document.getElementById("aiGenerateBtn");
  const status = document.getElementById("aiStatus");

  if (!name) {
    alert("請先填入商品名稱或編號");
    document.getElementById("aiProductName").focus();
    return;
  }

  btn.disabled    = true;
  btn.textContent = "⏳ 生成中...";
  status.textContent = "AI 正在查詢商品資訊，約需 5-10 秒…";
  status.className   = "text-xs text-gray-400";
  status.style.display="flex";

  try {
    const res  = await fetch(GENERATE_API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ productName: name }),
    });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || "生成失敗");

    const text = data.text || "";

    // 解析並填入欄位
    const nameMatch  = text.match(/商品名稱[：:]\s*(.+)/);
    const jnameMatch = text.match(/日文名稱[：:]\s*(.+)/);
    const idMatch    = text.match(/商品編號[：:]\s*(.+)/);
    const descMatch  = text.match(/商品內容跟特點[\s\S]*/);

    if (nameMatch)  document.getElementById("tname").value       = nameMatch[1].trim();
    if (jnameMatch) {
      const jnameEl = document.getElementById("jname");
      if (jnameEl) jnameEl.value = jnameMatch[1].trim();
    }
    if (idMatch) {
      const idnumEl = document.getElementById("idnumber");
      if (idnumEl && !idnumEl.value) idnumEl.value = idMatch[1].trim();
    }
    if (descMatch) {
      // 移除商品名稱、日文名稱、商品編號那幾行，只保留描述部分
      const desc = descMatch[0].trim();
      document.getElementById("description").value = desc;
    }

    status.textContent = "✅ 已生成並填入，請確認內容後繼續！";
    status.className   = "text-xs text-green-600";

    // 顯示預覽
    const preview = document.getElementById("aiPreview");
    preview.textContent = text;
    preview.style.display="flex";

    // 滾動到商品名稱
    document.getElementById("tname").scrollIntoView({ behavior: "smooth", block: "center" });

  } catch (err) {
    status.textContent = "❌ 生成失敗：" + err.message;
    status.className   = "text-xs text-red-500";
  } finally {
    btn.disabled    = false;
    btn.textContent = "✨ 一鍵生成";
  }
}

function resetForm() {
  document.getElementById("successScreen").style.display="none";
  ["tname","jname","idnumber","tprice","sprice","weight","mainCategory","category","description"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("idnumberStatus").textContent = ""; document.getElementById("idnumber").classList.remove("border-orange-400","border-green-400");
  document.getElementById("isView").checked = true; ["isNew","isHot","isSale"].forEach(id => document.getElementById(id).checked = false);
  document.getElementById("saleEnd").value = "";
  mainImgUrl = ""; document.getElementById("mainImgPreview").style.display="none"; document.getElementById("mainImgRemove").style.display="none"; document.getElementById("mainImgPlaceholder").style.display="flex";
  detailUrls = []; document.getElementById("detailSlots").innerHTML = ""; addDetailSlot();
  document.getElementById("submitBtn").disabled = false; document.getElementById("submitBtn").textContent = "＋ 新增商品";
  // 清除 AI 生成區
  const aiPreview = document.getElementById("aiPreview");
  aiPreview.textContent = "";
  aiPreview.style.display="none";
  const aiStatus = document.getElementById("aiStatus");
  if (aiStatus) { aiStatus.textContent = ""; aiStatus.className = ""; }
  const aiInput = document.getElementById("aiInput");
  if (aiInput) aiInput.value = "";
}
</script>
  </main>
