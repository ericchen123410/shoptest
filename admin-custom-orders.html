<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客製化訂單管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<div class="px-4 py-4 max-w-4xl mx-auto">

  <!-- 搜尋 + 篩選 -->
  <div class="flex gap-2 mb-3">
    <input id="searchInput" type="text" placeholder="搜尋商品名稱、客戶編號…"
      class="flex-1 border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
    <select id="filterStatus"
      class="border rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-black">
      <option value="全部">全部</option>
      <option value="待處理">待處理</option>
      <option value="處理中">處理中</option>
      <option value="已完成">已完成</option>
      <option value="已取消">已取消</option>
    </select>
  </div>

  <div id="countBadge" class="text-xs text-gray-400 mb-3"></div>
  <div id="orderList" class="space-y-2">
    <div class="text-center text-gray-400 py-8 text-sm">載入中...</div>
  </div>
</div>

<!-- 詳情 Modal -->
<div id="modal" class="hidden fixed inset-0 z-50 bg-black bg-opacity-40 flex items-end sm:items-center justify-center p-0 sm:p-4">
  <div class="bg-white w-full sm:max-w-lg sm:rounded-2xl rounded-t-2xl max-h-[90vh] overflow-y-auto">
    <div class="sticky top-0 bg-white flex justify-between items-center px-4 py-3 border-b rounded-t-2xl">
      <div>
        <div id="modalOrderId" class="font-bold text-base"></div>
        <div id="modalDate" class="text-xs text-gray-400"></div>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="deleteOrder()" class="text-xs text-red-400 hover:text-red-600 px-2 py-1 rounded-lg hover:bg-red-50">🗑 刪除</button>
        <button onclick="closeModal()" class="text-gray-400 hover:text-black text-xl w-8 h-8 flex items-center justify-center">✕</button>
      </div>
    </div>
    <div class="px-4 py-4 space-y-4">

      <!-- 客戶資料 -->
      <div class="bg-gray-50 rounded-xl p-3 space-y-2" id="customerInfo">
        <div class="text-xs text-gray-400 text-center py-2">載入中...</div>
      </div>

      <!-- 訂單內容 -->
      <div class="space-y-2 text-sm">
        <div class="flex justify-between">
          <span class="text-gray-500">商品名稱</span>
          <span id="modalProduct" class="font-medium text-right max-w-[200px]"></span>
        </div>
        <div class="flex justify-between">
          <span class="text-gray-500">來源平台</span>
          <span id="modalSource" class="font-medium"></span>
        </div>
        <div class="flex justify-between">
          <span class="text-gray-500">數量</span>
          <span id="modalQty" class="font-medium"></span>
        </div>
        <div id="modalNoteWrap" class="hidden">
          <span class="text-gray-500">備註</span>
          <div id="modalNote" class="mt-1 text-gray-700 text-xs bg-gray-50 rounded-lg p-2 leading-relaxed"></div>
        </div>
      </div>

      <!-- 台灣價錢 + 重量 -->
      <div class="bg-gray-50 rounded-xl p-3 space-y-3">
        <div>
          <div class="text-xs text-gray-500 mb-2">台灣價錢（手動填入）</div>
          <div class="flex gap-2">
            <input id="priceInput" type="number" placeholder="NT$"
              class="flex-1 border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black">
            <button onclick="savePriceWeight()"
              class="px-3 py-2 bg-black text-white text-xs rounded-xl hover:bg-gray-800 transition shrink-0">
              儲存
            </button>
          </div>
          <div id="currentPrice" class="text-xs text-gray-400 mt-1.5"></div>
        </div>
        <div>
          <div class="text-xs text-gray-500 mb-2">重量 kg（合併結帳用）</div>
          <input id="weightInput" type="number" step="0.01" placeholder="例：0.5"
            class="w-full border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black">
        </div>
      </div>

      <!-- 狀態 -->
      <div>
        <div class="text-xs text-gray-500 mb-2">訂單狀態</div>
        <div class="grid grid-cols-2 gap-2" id="statusBtns">
          <button onclick="updateStatus('待處理')" id="statusBtn-待處理"
            class="py-2 rounded-xl border text-sm font-medium transition">待處理</button>
          <button onclick="updateStatus('處理中')" id="statusBtn-處理中"
            class="py-2 rounded-xl border text-sm font-medium transition">處理中</button>
          <button onclick="updateStatus('已完成')" id="statusBtn-已完成"
            class="py-2 rounded-xl border text-sm font-medium transition">已完成</button>
          <button onclick="updateStatus('已取消')" id="statusBtn-已取消"
            class="py-2 rounded-xl border text-sm font-medium transition">已取消</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const API          = "https://shop-project-azure.vercel.app/api/custom-order";
const CUSTOMER_API = "https://shop-project-azure.vercel.app/api/customer";

const STATUS_STYLE = {
  "待處理": "bg-yellow-100 text-yellow-700",
  "處理中": "bg-blue-100 text-blue-600",
  "已完成": "bg-green-100 text-green-600",
  "已取消": "bg-gray-100 text-gray-500",
};

let allOrders = [];
let currentOrder = null;

async function init() {
  try {
    const res = await fetch(API + "?type=list");
    allOrders = await res.json();
    renderList();
  } catch (err) {
    document.getElementById("orderList").innerHTML =
      `<div class="text-center text-red-400 py-6 text-sm">載入失敗：${err.message}</div>`;
  }
}

function renderList() {
  const kw     = document.getElementById("searchInput").value.trim().toLowerCase();
  const status = document.getElementById("filterStatus").value;

  let list = allOrders;
  if (kw)            list = list.filter(o =>
    (o.productName || "").toLowerCase().includes(kw) ||
    (o.customerId  || "").toLowerCase().includes(kw) ||
    (o.orderId     || "").toLowerCase().includes(kw)
  );
  if (status !== "全部") list = list.filter(o => o.status === status);

  document.getElementById("countBadge").textContent = `共 ${list.length} 筆`;

  if (!list.length) {
    document.getElementById("orderList").innerHTML =
      `<div class="text-center text-gray-400 py-8 text-sm">沒有符合的訂單</div>`;
    return;
  }

  document.getElementById("orderList").innerHTML = list.map(o => {
    const st   = STATUS_STYLE[o.status] || "bg-gray-100 text-gray-500";
    const date = new Date(o.createdAt);
    const dateStr = `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,"0")}:${String(date.getMinutes()).padStart(2,"0")}`;
    return `
      <div onclick="openModal('${o.pageId}')"
        class="bg-white rounded-xl border px-4 py-3 cursor-pointer hover:shadow-md transition">
        <div class="flex justify-between items-start">
          <div class="min-w-0">
            <div class="flex items-center gap-2 mb-0.5">
              <span class="text-sm font-bold">${o.orderId}</span>
              <span class="text-xs px-2 py-0.5 rounded-full ${st}">${o.status}</span>
            </div>
            <div class="text-sm text-gray-700 truncate max-w-[200px]">${o.productName}</div>
            <div class="text-xs text-gray-400">${o.source ? o.source + " · " : ""}數量 ${o.quantity}</div>
            ${o.customerId ? `<div class="text-xs text-blue-500 mt-0.5">${o.customerId}</div>` : ""}
          </div>
          <div class="text-right shrink-0 ml-2">
            ${o.price ? `<div class="text-sm font-bold text-red-500">NT$ ${Math.round(o.price).toLocaleString()}</div>` : '<div class="text-xs text-gray-300">未定價</div>'}
            <div class="text-xs text-gray-400">${dateStr}</div>
          </div>
        </div>
      </div>`;
  }).join("");
}

async function openModal(pageId) {
  currentOrder = allOrders.find(o => o.pageId === pageId);
  if (!currentOrder) return;
  const o = currentOrder;

  document.getElementById("modalOrderId").textContent = o.orderId;
  const date = new Date(o.createdAt);
  document.getElementById("modalDate").textContent =
    `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,"0")}:${String(date.getMinutes()).padStart(2,"0")}`;

  document.getElementById("modalProduct").textContent = o.productName;
  document.getElementById("modalSource").textContent  = o.source || "—";
  document.getElementById("modalQty").textContent     = o.quantity + " 件";
  document.getElementById("priceInput").value         = o.price || "";
  document.getElementById("weightInput").value        = o.weight || "";
  document.getElementById("currentPrice").textContent = o.price ? `目前：NT$ ${Math.round(o.price).toLocaleString()}` : "尚未定價";

  if (o.note) {
    document.getElementById("modalNote").textContent = o.note;
    document.getElementById("modalNoteWrap").classList.remove("hidden");
  } else {
    document.getElementById("modalNoteWrap").classList.add("hidden");
  }

  // 狀態按鈕
  ["待處理","處理中","已完成","已取消"].forEach(s => {
    const btn = document.getElementById(`statusBtn-${s}`);
    btn.className = `py-2 rounded-xl border text-sm font-medium transition ${s === o.status ? "bg-black text-white border-black" : "bg-white text-gray-600 border-gray-300 hover:border-black"}`;
  });

  document.getElementById("modal").classList.remove("hidden");
  document.body.style.overflow = "hidden";

  // 查客戶資料
  const infoEl = document.getElementById("customerInfo");
  if (o.customerId) {
    try {
      const res  = await fetch(CUSTOMER_API + "?customerId=" + encodeURIComponent(o.customerId));
      const data = await res.json();
      if (data.found) {
        infoEl.innerHTML = `
          <div class="flex justify-between items-center mb-1">
            <span class="text-xs font-medium text-gray-500">客戶資料</span>
            <span class="text-xs text-blue-500 font-bold">${o.customerId}</span>
          </div>
          <div class="space-y-1 text-sm">
            <div class="flex justify-between"><span class="text-gray-500">姓名</span><span class="font-medium">${data.name || "—"}</span></div>
            <div class="flex justify-between"><span class="text-gray-500">電話</span><a href="tel:${data.phone}" class="font-medium text-blue-500">${data.phone || "—"}</a></div>
            <div class="flex justify-between"><span class="text-gray-500">Email</span><a href="mailto:${data.email}" class="font-medium text-blue-500 text-xs">${data.email || "—"}</a></div>
            <div class="text-sm"><span class="text-gray-500">地址　</span><span class="font-medium">${data.address || "—"}</span></div>
          </div>`;
      } else {
        infoEl.innerHTML = `<div class="text-xs text-gray-400 text-center py-2">${o.customerId}</div>`;
      }
    } catch {
      infoEl.innerHTML = `<div class="text-xs text-red-400 text-center py-2">載入失敗</div>`;
    }
  } else {
    infoEl.innerHTML = `<div class="text-xs text-gray-400 text-center py-2">無客戶資料</div>`;
  }
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
  document.body.style.overflow = "";
  currentOrder = null;
}

document.getElementById("modal").addEventListener("click", e => {
  if (e.target === document.getElementById("modal")) closeModal();
});

async function savePriceWeight() {
  if (!currentOrder) return;
  const price  = Number(document.getElementById("priceInput").value);
  const weight = Number(document.getElementById("weightInput").value);
  try {
    const res  = await fetch(API, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pageId: currentOrder.pageId, status: currentOrder.status, price, weight }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    currentOrder.price  = price;
    currentOrder.weight = weight;
    const found = allOrders.find(o => o.pageId === currentOrder.pageId);
    found.price = price; found.weight = weight;
    document.getElementById("currentPrice").textContent = `目前：NT$ ${Math.round(price).toLocaleString()}`;
    renderList();
  } catch (err) {
    alert("儲存失敗：" + err.message);
  }
}

async function updateStatus(status) {
  if (!currentOrder) return;
  try {
    const res  = await fetch(API, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pageId: currentOrder.pageId, status }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    currentOrder.status = status;
    allOrders.find(o => o.pageId === currentOrder.pageId).status = status;
    ["待處理","處理中","已完成","已取消"].forEach(s => {
      const btn = document.getElementById(`statusBtn-${s}`);
      btn.className = `py-2 rounded-xl border text-sm font-medium transition ${s === status ? "bg-black text-white border-black" : "bg-white text-gray-600 border-gray-300 hover:border-black"}`;
    });
    renderList();
  } catch (err) {
    alert("更新失敗：" + err.message);
  }
}

async function deleteOrder() {
  if (!currentOrder) return;
  if (!confirm(`確定刪除「${currentOrder.orderId}」？`)) return;
  try {
    const res  = await fetch(API, {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pageId: currentOrder.pageId }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    allOrders = allOrders.filter(o => o.pageId !== currentOrder.pageId);
    closeModal();
    renderList();
  } catch (err) {
    alert("刪除失敗：" + err.message);
  }
}

document.getElementById("searchInput").addEventListener("input", renderList);
document.getElementById("filterStatus").addEventListener("change", renderList);

init();
</script>
</body>
</html>
