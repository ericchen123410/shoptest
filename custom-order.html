<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客戶客製化訂單</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Navibar -->
<div class="sticky top-0 z-50 bg-white border-b shadow-sm">
  <div class="flex justify-between items-center px-4 py-2 max-w-7xl mx-auto">
    <div class="flex items-center gap-1">
      <a href="index.html" class="font-bold px-2 py-1.5 rounded-lg hover:bg-gray-100 text-sm">🏠</a>
      <a href="new.html"   class="px-2 py-1.5 rounded-lg hover:bg-gray-100 text-xs">🆕</a>
      <a href="hot.html"   class="px-2 py-1.5 rounded-lg hover:bg-gray-100 text-xs">🔥</a>
      <a href="sale.html"  class="px-2 py-1.5 rounded-lg hover:bg-gray-100 text-xs">🈹</a>
    </div>
    <div class="flex items-center gap-1">
      <a href="order-status.html" class="px-2 py-1.5 rounded-lg hover:bg-gray-100 text-xs">📋</a>
      <a href="cart.html" class="px-2 py-1.5 rounded-lg hover:bg-gray-100 text-sm">
        🛒 <span id="cartCount" class="bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full">0</span>
      </a>
    </div>
  </div>
</div>

<div class="px-4 py-6 max-w-xl mx-auto">

  <div class="mb-6">
    <h1 class="text-xl font-bold text-gray-900 mb-1">客戶客製化訂單</h1>
    <p class="text-sm text-gray-400">填寫您想要代購的商品資訊，我們將為您確認價格與可行性後聯繫您</p>
  </div>

  <!-- 表單 -->
  <div class="space-y-4">

    <!-- 商品名稱 -->
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <label class="text-xs font-semibold text-gray-500 mb-2 block">商品名稱 <span class="text-red-500">*</span></label>
      <input id="productName" type="text" placeholder="請輸入商品名稱"
        class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
    </div>

    <!-- 來源平台 -->
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <label class="text-xs font-semibold text-gray-500 mb-2 block">來源平台</label>
      <div id="sourceBtns" class="flex flex-wrap gap-2 mb-2">
        <div class="text-xs text-gray-300">載入中...</div>
      </div>
      <input id="sourceInput" type="text" placeholder="或輸入其他平台"
        class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
    </div>

    <!-- 數量 -->
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <label class="text-xs font-semibold text-gray-500 mb-2 block">數量</label>
      <div class="flex items-center gap-3">
        <button onclick="changeQty(-1)"
          class="w-10 h-10 border rounded-xl flex items-center justify-center text-lg hover:bg-gray-50 active:bg-gray-100 transition">−</button>
        <span id="qtyDisplay" class="text-lg font-bold w-8 text-center">1</span>
        <button onclick="changeQty(1)"
          class="w-10 h-10 border rounded-xl flex items-center justify-center text-lg hover:bg-gray-50 active:bg-gray-100 transition">＋</button>
      </div>
    </div>

    <!-- 備註 -->
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <label class="text-xs font-semibold text-gray-500 mb-2 block">備註 <span class="text-gray-400">（顏色、尺寸、連結等）</span></label>
      <textarea id="note" rows="4" placeholder="請填寫商品連結、顏色、尺寸或其他需求"
        class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black resize-none"></textarea>
    </div>

    <!-- 收件資料 -->
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <label class="text-xs font-semibold text-gray-500 mb-3 block">收件資料</label>
      <div class="space-y-3">
        <input id="name" type="text" placeholder="姓名 *"
          class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
        <input id="phone" type="tel" placeholder="手機 *"
          class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
        <input id="email" type="email" placeholder="Email *"
          class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
        <input id="address" type="text" placeholder="收件地址 *"
          class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
      </div>
    </div>

    <p class="text-xs text-gray-400 text-center">送出後我們會確認可行性與價格，再與您聯繫</p>

    <button id="submitBtn" onclick="submitOrder()"
      class="w-full py-4 bg-black text-white font-semibold rounded-2xl active:bg-gray-800 transition text-base shadow-sm">
      送出客製化需求
    </button>
    <div class="pb-8"></div>
  </div>
</div>

<!-- 成功畫面 -->
<div id="successScreen" class="hidden fixed inset-0 bg-white z-50 flex flex-col items-center justify-center px-6">
  <div class="text-6xl mb-4">🎉</div>
  <h2 class="text-2xl font-bold mb-2">需求已送出！</h2>
  <p class="text-gray-400 text-sm mb-2">我們將盡快確認並與您聯繫</p>
  <div class="bg-gray-50 border rounded-xl px-6 py-4 text-center mb-6 mt-4">
    <div class="text-xs text-gray-400 mb-0.5">您的訂單編號</div>
    <div id="displayOrderId" class="text-lg font-bold tracking-wider text-black"></div>
  </div>
  <a href="index.html"
    class="w-full max-w-xs py-3 bg-black text-white text-center font-medium rounded-xl active:bg-gray-800 block">
    回到首頁
  </a>
</div>

<script src="./js/cartCount.js"></script>
<script>
const API = "https://shoptest-chi.vercel.app/api/custom-order";
const CUSTOMER_API = "https://shoptest-chi.vercel.app/api/customer";

const BTN_NORMAL = "px-3 py-1.5 rounded-full border text-xs transition bg-white text-gray-600 border-gray-300 hover:border-black";
const BTN_ACTIVE = "px-3 py-1.5 rounded-full border text-xs transition bg-black text-white border-black";

let qty = 1;
let selectedSource = "";

// ── 載入平台選項 ─────────────────────────────────────
(async () => {
  try {
    const res  = await fetch(API + "?type=sources");
    const sources = await res.json();
    const el = document.getElementById("sourceBtns");
    el.innerHTML = "";
    sources.forEach(s => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = s;
      btn.className = BTN_NORMAL;
      btn.onclick = () => {
        selectedSource = s;
        document.getElementById("sourceInput").value = "";
        el.querySelectorAll("button").forEach(b => b.className = BTN_NORMAL);
        btn.className = BTN_ACTIVE;
      };
      el.appendChild(btn);
    });
  } catch {
    document.getElementById("sourceBtns").innerHTML = "";
  }

  // sourceInput 輸入時取消按鈕選取
  document.getElementById("sourceInput").addEventListener("input", (e) => {
    selectedSource = e.target.value.trim();
    document.getElementById("sourceBtns").querySelectorAll("button").forEach(b => b.className = BTN_NORMAL);
  });
})();

// ── 數量 ─────────────────────────────────────────────
function changeQty(delta) {
  qty = Math.max(1, qty + delta);
  document.getElementById("qtyDisplay").textContent = qty;
}

// ── 送出 ─────────────────────────────────────────────
async function submitOrder() {
  const productName = document.getElementById("productName").value.trim();
  const source      = selectedSource || document.getElementById("sourceInput").value.trim();
  const note        = document.getElementById("note").value.trim();
  const name        = document.getElementById("name").value.trim();
  const phone       = document.getElementById("phone").value.trim();
  const email       = document.getElementById("email").value.trim();
  const address     = document.getElementById("address").value.trim();

  if (!productName)                    { alert("請填寫商品名稱"); return; }
  if (!name || !phone || !email || !address) { alert("請填寫完整收件資料"); return; }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "處理中...";

  try {
    // 查詢或建立客戶
    btn.textContent = "確認客戶資料...";
    const custCheck = await fetch(CUSTOMER_API + "?email=" + encodeURIComponent(email));
    const custData  = await custCheck.json();

    let customerId;
    if (custData.found) {
      customerId = custData.customerId;
    } else {
      const custCreate = await fetch(CUSTOMER_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, name, phone, address }),
      });
      const created = await custCreate.json();
      if (!created.customerId) throw new Error("客戶建立失敗");
      customerId = created.customerId;
    }

    // 建立客製化訂單
    btn.textContent = "送出中...";
    const orderId = "CUS" + Date.now().toString().slice(-8);
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ orderId, customerId, productName, source, quantity: qty, note }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || "送出失敗");

    document.getElementById("displayOrderId").textContent = orderId;
    document.getElementById("successScreen").classList.remove("hidden");

  } catch (err) {
    alert("送出失敗：" + err.message);
    btn.disabled = false;
    btn.textContent = "送出客製化需求";
  }
}
</script>
</body>
</html>
